<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alle læreplasser — Admin OLKV</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>

  <nav class="nav">
    <div class="nav-innhold">
      <a href="/" class="nav-logo">
        <span class="logo-ol">OL</span><span class="logo-kv">KV</span>
      </a>
      <div class="nav-lenker" style="gap:0.5rem;align-items:center;">
        <span class="badge badge-roed">Admin</span>
        <span id="nav-navn" style="font-size:0.9rem;color:var(--farge-tekst-sekundaer);"></span>
        <div class="varsel-dropdown-wrapper">
          <button class="varsel-bjelle" id="varsel-bjelle" aria-label="Varsler">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span class="varsel-bjelle-badge" id="varsel-count" style="display:none;"></span>
          </button>
          <div class="varsel-dropdown skjult" id="varsel-dropdown">
            <div class="varsel-dropdown-header">Varsler</div>
          </div>
        </div>
        <button class="btn btn-ghost btn-liten" id="logg-ut-btn">Logg ut</button>
      </div>
    </div>
  </nav>

  <div class="dashboard-layout">
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <div class="sidebar-seksjon-tittel">Admin</div>
        <a href="/admin/dashboard.html" class="sidebar-lenke">
          <span class="sidebar-ikon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span> Dashbord
        </a>
        <a href="/admin/soknader.html" class="sidebar-lenke">
          <span class="sidebar-ikon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span> Alle søknader
        </a>
        <a href="/admin/laereplasser.html" class="sidebar-lenke aktiv">
          <span class="sidebar-ikon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg></span> Alle læreplasser
        </a>
        <a href="/admin/brukere.html" class="sidebar-lenke">
          <span class="sidebar-ikon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span> Alle brukere
        </a>
      </nav>
    </aside>

    <main class="hoveddel page-content">
      <div class="rad reveal" style="margin-bottom:2rem;justify-content:space-between;flex-wrap:wrap;gap:1rem;">
        <div>
          <h1 style="font-size:1.75rem;">Alle læreplasser</h1>
          <p style="color:var(--farge-tekst-sekundaer);" id="antall-tekst">Laster…</p>
        </div>
        <button class="btn btn-primary" id="ny-annonse-btn">+ Opprett læreplass</button>
      </div>

      <div class="filter-rad reveal">
        <input type="search" id="sok-input" placeholder="Søk på tittel eller bedrift…" />
        <select id="status-filter">
          <option value="">Alle statuser</option>
          <option value="aktiv">Aktive</option>
          <option value="inaktiv">Inaktive</option>
        </select>
        <select id="fagomraade-filter">
          <option value="">Alle fagområder</option>
        </select>
      </div>

      <div id="varsel" class="varsel skjult"></div>

      <section class="reveal">
        <div class="tabell-wrapper">
          <table class="tabell">
            <thead>
              <tr>
                <th>Tittel</th>
                <th>Bedrift</th>
                <th>Fagområde</th>
                <th>Sted</th>
                <th>Frist</th>
                <th>Søknader</th>
                <th>Status</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="laereplasser-tbody">
              <tr><td colspan="8" class="skeleton" style="height:200px;"></td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <!-- NY ANNONSE MODAL (på vegne av bedrift) -->
  <div class="modal-bakgrunn skjult" id="annonse-modal">
    <div class="modal" style="max-width:600px;">
      <div class="modal-hode">
        <h3 class="modal-tittel">Opprett læreplass</h3>
        <button class="modal-lukk" id="annonse-lukk">&times;</button>
      </div>
      <div class="modal-kropp">
        <div id="annonse-varsel" class="varsel skjult"></div>
        <form id="annonse-form">
          <div class="form-gruppe">
            <label class="etikett" for="a-bedrift">Bedrift (velg) <span style="color:var(--olkv-red);">*</span></label>
            <select id="a-bedrift" class="input" required>
              <option value="">Laster bedrifter…</option>
            </select>
          </div>
          <div class="form-gruppe">
            <label class="etikett" for="a-tittel">Tittel <span style="color:var(--olkv-red);">*</span></label>
            <input type="text" id="a-tittel" class="input" placeholder="f.eks. Lærling i salgsfaget" required />
          </div>
          <div class="rutenett-2" style="gap:0.75rem;">
            <div class="form-gruppe">
              <label class="etikett" for="a-fagomraade">Fagområde</label>
              <select id="a-fagomraade" class="input"></select>
            </div>
            <div class="form-gruppe">
              <label class="etikett" for="a-sted">Sted</label>
              <input type="text" id="a-sted" class="input" placeholder="f.eks. Bergen" />
            </div>
          </div>
          <div class="form-gruppe">
            <label class="etikett" for="a-beskrivelse">Beskrivelse</label>
            <textarea id="a-beskrivelse" class="input" rows="3" placeholder="Beskriv læreplassen…"></textarea>
          </div>
          <div class="rutenett-2" style="gap:0.75rem;">
            <div class="form-gruppe">
              <label class="etikett" for="a-frist">Søknadsfrist <span style="color:var(--olkv-red);">*</span></label>
              <input type="date" id="a-frist" class="input" required />
            </div>
            <div class="form-gruppe">
              <label class="etikett" for="a-antall">Antall plasser</label>
              <input type="number" id="a-antall" class="input" min="1" value="1" />
            </div>
          </div>
          <button type="submit" class="btn btn-primary" id="annonse-send-btn" style="width:100%;margin-top:0.5rem;">Publiser</button>
        </form>
      </div>
    </div>
  </div>

  <script type="module">
    import {
      krevInnlogging, loggUt, hentAlleLaereplasser, hentAlleBrukere,
      lagreAnnonseUtvidet, formaterDato, initScrollReveal, fagomraader, initVarselBjelle
    } from '../app.js';

    let bruker = null;
    bruker = await krevInnlogging('admin');
    if (!bruker) { window.location.href = '/login.html'; }

    document.getElementById('nav-navn').textContent = bruker.navn || '';
    document.getElementById('logg-ut-btn').addEventListener('click', async () => { await loggUt(); });

    // Fyll fagomraade filtere
    const fagomraadeFilter = document.getElementById('fagomraade-filter');
    const fagomraadeForm = document.getElementById('a-fagomraade');
    fagomraader.forEach(f => {
      [fagomraadeFilter, fagomraadeForm].forEach(sel => {
        const opt = document.createElement('option');
        opt.value = f; opt.textContent = f;
        sel.appendChild(opt);
      });
    });

    // Hent bedrifter for form
    async function lastBedrifter() {
      const bedrifter = await hentAlleBrukere('bedrift');
      const sel = document.getElementById('a-bedrift');
      sel.innerHTML = '<option value="">Velg bedrift…</option>';
      bedrifter.filter(b => b.godkjent).forEach(b => {
        const opt = document.createElement('option');
        opt.value = b.uid;
        opt.dataset.navn = b.navn;
        opt.textContent = b.navn;
        sel.appendChild(opt);
      });
    }

    async function lastLaereplasser() {
      const params = {};
      const status = document.getElementById('status-filter').value;
      const fag = document.getElementById('fagomraade-filter').value;
      const sok = document.getElementById('sok-input').value.trim();
      if (status) params.status = status;
      if (fag) params.fagomraade = fag;
      if (sok) params.sok = sok;

      const plasser = await hentAlleLaereplasser(params);
      document.getElementById('antall-tekst').textContent = `${plasser.length} læreplasser`;

      const tbody = document.getElementById('laereplasser-tbody');
      if (!plasser.length) {
        tbody.innerHTML = `<tr><td colspan="8"><div class="tom-tilstand"><div class="tom-tilstand-ikon">📢</div><h3>Ingen læreplasser funnet</h3></div></td></tr>`;
        return;
      }
      tbody.innerHTML = plasser.map(p => `
        <tr>
          <td><strong>${p.tittel}</strong></td>
          <td>${p.bedrift_naam || '—'}</td>
          <td>${p.fagomraade || p.bransje || '—'}</td>
          <td>${p.sted || '—'}</td>
          <td>${formaterDato(p.frist)}</td>
          <td><span class="badge badge-blaa">${p.antall_soknader || 0}</span></td>
          <td><span class="badge ${p.aktiv ? 'badge-godkjent' : 'badge-graa'}">${p.aktiv ? 'Aktiv' : 'Inaktiv'}</span></td>
          <td>
            <button class="btn-mini btn-mini-roed" onclick="slettLaereplassklikk(${p.id})">Slett</button>
          </td>
        </tr>`).join('');
    }

    window.slettLaereplassklikk = async function(id) {
      if (!confirm('Er du sikker på at du vil slette denne læreplassen? Alle søknader knyttet til den vil også slettes.')) return;
      try {
        const { getToken } = await import('../app.js');
        const token = await getToken();
        const res = await fetch(`/api/admin/laereplasser/${id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
        if (!res.ok) { const j = await res.json(); throw new Error(j.feil); }
        await lastLaereplasser();
      } catch (err) { alert(err.message); }
    };

    document.getElementById('ny-annonse-btn').addEventListener('click', async () => {
      await lastBedrifter();
      document.getElementById('annonse-form').reset();
      document.getElementById('annonse-varsel').classList.add('skjult');
      document.getElementById('annonse-modal').classList.remove('skjult');
    });

    document.getElementById('annonse-lukk').addEventListener('click', () => document.getElementById('annonse-modal').classList.add('skjult'));
    document.getElementById('annonse-modal').addEventListener('click', (e) => { if (e.target === e.currentTarget) document.getElementById('annonse-modal').classList.add('skjult'); });

    document.getElementById('annonse-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('annonse-send-btn');
      btn.disabled = true; btn.textContent = 'Publiserer…';

      try {
        const bedriftSel = document.getElementById('a-bedrift');
        const valgtOpt = bedriftSel.options[bedriftSel.selectedIndex];
        await lagreAnnonseUtvidet({
          tittel: document.getElementById('a-tittel').value.trim(),
          fagomraade: document.getElementById('a-fagomraade').value,
          sted: document.getElementById('a-sted').value.trim(),
          beskrivelse: document.getElementById('a-beskrivelse').value.trim(),
          frist: document.getElementById('a-frist').value,
          antall_plasser: parseInt(document.getElementById('a-antall').value) || 1,
          bedrift_user_id: bedriftSel.value,
          bedrift_naam: valgtOpt?.dataset.navn || ''
        });
        document.getElementById('annonse-modal').classList.add('skjult');
        await lastLaereplasser();
        const toast = document.createElement('div');
        toast.className = 'toast'; toast.textContent = '✓ Læreplass publisert!';
        document.body.appendChild(toast); setTimeout(() => toast.remove(), 4000);
      } catch (err) {
        document.getElementById('annonse-varsel').className = 'varsel varsel-feil';
        document.getElementById('annonse-varsel').textContent = err.message;
        document.getElementById('annonse-varsel').classList.remove('skjult');
      } finally { btn.disabled = false; btn.textContent = 'Publiser'; }
    });

    let debounce;
    document.getElementById('sok-input').addEventListener('input', () => { clearTimeout(debounce); debounce = setTimeout(lastLaereplasser, 300); });
    document.getElementById('status-filter').addEventListener('change', lastLaereplasser);
    document.getElementById('fagomraade-filter').addEventListener('change', lastLaereplasser);

    await lastLaereplasser();
    initScrollReveal();
    initVarselBjelle();
  </script>
  <script src="/cookie-banner.js" defer></script>
</body>
</html>
