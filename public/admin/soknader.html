<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alle søknader — Admin OLKV</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>

  <nav class="nav">
    <div class="nav-innhold">
      <a href="/" class="nav-logo">
        <span class="logo-ol">OL</span><span class="logo-kv">KV</span>
      </a>
      <div class="nav-lenker" style="gap:0.5rem;align-items:center;">
        <span class="badge badge-roed">Admin</span>
        <span id="nav-navn" style="font-size:0.9rem;color:var(--farge-tekst-sekundaer);"></span>
        <div class="varsel-dropdown-wrapper">
          <button class="varsel-bjelle" id="varsel-bjelle" aria-label="Varsler">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span class="varsel-bjelle-badge" id="varsel-count" style="display:none;"></span>
          </button>
          <div class="varsel-dropdown skjult" id="varsel-dropdown">
            <div class="varsel-dropdown-header">Varsler</div>
          </div>
        </div>
        <button class="btn btn-ghost btn-liten" id="logg-ut-btn">Logg ut</button>
      </div>
    </div>
  </nav>

  <div class="dashboard-layout">
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <div class="sidebar-seksjon-tittel">Admin</div>
        <a href="/admin/dashboard.html" class="sidebar-lenke">
          <span class="sidebar-ikon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span> Dashbord
        </a>
        <a href="/admin/soknader.html" class="sidebar-lenke aktiv">
          <span class="sidebar-ikon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span> Alle søknader
        </a>
        <a href="/admin/laereplasser.html" class="sidebar-lenke">
          <span class="sidebar-ikon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg></span> Alle læreplasser
        </a>
        <a href="/admin/brukere.html" class="sidebar-lenke">
          <span class="sidebar-ikon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span> Alle brukere
        </a>
        <a href="/admin/profil.html" class="sidebar-lenke">
          <span class="sidebar-ikon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span> Min profil
        </a>
      </nav>
    </aside>

    <main class="hoveddel page-content">
      <div class="rad reveal" style="margin-bottom:2rem;justify-content:space-between;flex-wrap:wrap;gap:1rem;">
        <div>
          <h1 style="font-size:1.75rem;">Alle søknader</h1>
          <p style="color:var(--farge-tekst-sekundaer);" id="antall-tekst">Laster…</p>
        </div>
      </div>

      <div class="filter-rad reveal">
        <input type="search" id="sok-input" placeholder="Søk på navn, læreplass, bedrift…" />
        <select id="status-filter">
          <option value="alle">Alle statuser</option>
          <option value="sendt">Sendt</option>
          <option value="under_behandling">Under behandling</option>
          <option value="godkjent">Godkjent</option>
          <option value="avslatt">Avslått</option>
          <option value="trukket">Trukket</option>
        </select>
      </div>

      <div id="varsel" class="varsel skjult"></div>

      <section class="reveal">
        <div class="tabell-wrapper" id="tabell-wrapper">
          <table class="tabell" id="soknader-tabell">
            <thead>
              <tr>
                <th>Søker</th>
                <th>Læreplass</th>
                <th>Bedrift</th>
                <th>Sendt</th>
                <th>Status</th>
                <th>Handlinger</th>
              </tr>
            </thead>
            <tbody id="soknader-tbody">
              <tr><td colspan="6" class="skeleton" style="height:200px;"></td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <!-- DETALJER MODAL -->
  <div class="modal-bakgrunn skjult" id="detaljer-modal">
    <div class="modal" style="max-width:600px;">
      <div class="modal-hode">
        <h3 class="modal-tittel" id="detaljer-tittel">Søknadsdetaljer</h3>
        <button class="modal-lukk" id="detaljer-lukk">&times;</button>
      </div>
      <div class="modal-kropp" id="detaljer-innhold"></div>
    </div>
  </div>

  <!-- BEKREFTELSE MODAL -->
  <div class="modal-bakgrunn skjult" id="bekreft-modal">
    <div class="modal" style="max-width:460px;">
      <div class="modal-hode">
        <h3 class="modal-tittel" id="bekreft-tittel">Bekreft handling</h3>
        <button class="modal-lukk" id="bekreft-lukk">&times;</button>
      </div>
      <div class="modal-kropp">
        <p id="bekreft-tekst" style="margin-bottom:1rem;"></p>
        <div class="form-gruppe">
          <label class="etikett" for="bekreft-kommentar">Kommentar (valgfritt)</label>
          <textarea id="bekreft-kommentar" class="input" rows="3" placeholder="Legg til en melding til søkeren…"></textarea>
        </div>
        <div style="display:flex;gap:0.75rem;justify-content:flex-end;margin-top:1rem;">
          <button class="btn btn-ghost" id="bekreft-avbryt">Avbryt</button>
          <button class="btn btn-primary" id="bekreft-ok">Bekreft</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import {
      krevInnlogging, loggUt, hentAllesoknader, oppdaterSoknadStatusAdmin,
      statusTekst, statusBadgeKlasse, formaterDato, initScrollReveal, initVarselBjelle, getToken, escHtml
    } from '../app.js';

    let bruker = null;
    let alleSoknader = [];
    let bekreftCallback = null;

    bruker = await krevInnlogging('admin');
    if (!bruker) { window.location.href = '/login.html'; }

    document.getElementById('nav-navn').textContent = bruker.navn || '';
    document.getElementById('logg-ut-btn').addEventListener('click', async () => { await loggUt(); });

    async function lastSoknader() {
      const status = document.getElementById('status-filter').value;
      const sok = document.getElementById('sok-input').value.trim();
      alleSoknader = await hentAllesoknader({ status, sok });
      visSoknader(alleSoknader);
    }

    function visSoknader(soknader) {
      document.getElementById('antall-tekst').textContent = `${soknader.length} søknader`;
      const tbody = document.getElementById('soknader-tbody');

      if (!soknader.length) {
        tbody.innerHTML = `<tr><td colspan="6"><div class="tom-tilstand"><div class="tom-tilstand-ikon">📋</div><h3>Ingen søknader funnet</h3></div></td></tr>`;
        return;
      }

      tbody.innerHTML = soknader.map(s => `
        <tr style="cursor:pointer;" onclick="visDetaljer(${s.id})">
          <td>
            <strong>${escHtml(s.laerling_naam || '—')}</strong><br/>
            <span style="font-size:0.8rem;color:var(--olkv-gray);">${escHtml(s.laerling_epost || '')}</span>
          </td>
          <td>${escHtml(s.laerplass_tittel || '—')}</td>
          <td>${escHtml(s.bedrift_navn || '—')}</td>
          <td>${formaterDato(s.sendt_dato)}</td>
          <td><span class="${statusBadgeKlasse(s.status)}">${statusTekst(s.status)}</span></td>
          <td>
            <div class="tabell-handlinger" onclick="event.stopPropagation()">
              ${s.status !== 'under_behandling' && s.status !== 'godkjent' && s.status !== 'avslatt'
                ? `<button class="btn-mini btn-mini-blaa" onclick="settStatus(${s.id},'under_behandling','Sett søknad under behandling?')">Under behandling</button>` : ''}
              ${s.status !== 'godkjent'
                ? `<button class="btn-mini btn-mini-gronn" onclick="settStatus(${s.id},'godkjent','Godkjenn denne søknaden?')">Godkjenn</button>` : ''}
              ${s.status !== 'avslatt'
                ? `<button class="btn-mini btn-mini-roed" onclick="settStatus(${s.id},'avslatt','Avslå denne søknaden?')">Avslå</button>` : ''}
            </div>
          </td>
        </tr>`).join('');
    }

    window.visDetaljer = function(id) {
      const s = alleSoknader.find(x => x.id === id);
      if (!s) return;
      document.getElementById('detaljer-tittel').textContent = `${s.laerling_naam || 'Søker'} → ${s.laerplass_tittel || 'Læreplass'}`;
      document.getElementById('detaljer-innhold').innerHTML = `
        <div style="display:grid;gap:1rem;">
          <div class="rad" style="gap:1rem;flex-wrap:wrap;">
            <div style="flex:1;"><div class="hint">Søker</div><strong>${escHtml(s.laerling_naam || '—')}</strong><br/><span style="font-size:0.85rem;">${escHtml(s.laerling_epost || '')}</span></div>
            <div><div class="hint">Status</div><span class="${statusBadgeKlasse(s.status)}">${statusTekst(s.status)}</span></div>
          </div>
          <div class="rad" style="gap:1rem;flex-wrap:wrap;">
            <div style="flex:1;"><div class="hint">Læreplass</div>${escHtml(s.laerplass_tittel || '—')}</div>
            <div style="flex:1;"><div class="hint">Bedrift</div>${escHtml(s.bedrift_navn || '—')}</div>
          </div>
          ${s.utdanningsprogram ? `<div><div class="hint">Utdanningsprogram</div>${escHtml(s.utdanningsprogram)}</div>` : ''}
          ${(s.vg1 || s.vg2) ? `<div class="rad" style="gap:1rem;"><div><div class="hint">VG1</div>${escHtml(s.vg1 || '—')}</div><div><div class="hint">VG2</div>${escHtml(s.vg2 || '—')}</div></div>` : ''}
          ${s.melding ? `<div><div class="hint">Motivasjon</div><p style="background:var(--olkv-gray-light);padding:0.75rem;border-radius:var(--radius);font-size:0.88rem;margin:0.25rem 0 0;">${escHtml(s.melding)}</p></div>` : ''}
          ${s.erfaring ? `<div><div class="hint">Erfaring</div><p style="background:var(--olkv-gray-light);padding:0.75rem;border-radius:var(--radius);font-size:0.88rem;margin:0.25rem 0 0;">${escHtml(s.erfaring)}</p></div>` : ''}
          ${s.vedlegg ? `
            <div>
              <div class="hint">Vedlegg</div>
              <button class="btn btn-liten" style="margin-top:0.35rem;" onclick="lastNedVedlegg(${s.id})">
                Last ned CV${s.vedlegg_originalnavn ? ` (${s.vedlegg_originalnavn})` : ''}
              </button>
            </div>
          ` : ''}
          ${s.admin_kommentar ? `<div><div class="hint">Admin-kommentar</div><p style="background:#FEF3E2;padding:0.75rem;border-radius:var(--radius);font-size:0.88rem;margin:0.25rem 0 0;border-left:3px solid #B7791F;">${escHtml(s.admin_kommentar)}</p></div>` : ''}
          <div class="rad" style="gap:2rem;margin-top:0.5rem;padding-top:0.75rem;border-top:1px solid var(--farge-kant);">
            <div><div class="hint">Sendt</div>${formaterDato(s.sendt_dato)}</div>
            ${s.behandlet_dato ? `<div><div class="hint">Behandlet</div>${formaterDato(s.behandlet_dato)}</div>` : ''}
          </div>
          <div style="display:flex;gap:0.75rem;flex-wrap:wrap;margin-top:0.5rem;">
            ${s.status !== 'godkjent' ? `<button class="btn btn-liten" style="background:#e8f5e9;color:#1B5E20;border:none;" onclick="settStatus(${s.id},'godkjent','Godkjenn denne søknaden?')">✓ Godkjenn</button>` : ''}
            ${s.status !== 'avslatt' ? `<button class="btn btn-liten" style="background:#FDECEA;color:#922B21;border:none;" onclick="settStatus(${s.id},'avslatt','Avslå denne søknaden?')">✕ Avslå</button>` : ''}
            <button class="btn btn-liten" style="background:#eff6ff;color:var(--olkv-blue);border:none;" id="ai-oppsummer-btn" onclick="aiOppsummer(${s.id})">✨ AI-sammendrag</button>
          </div>
          <div id="ai-oppsummer-boks" style="display:none;margin-top:0.75rem;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:0.75rem;font-size:0.875rem;">
            <span style="font-size:0.75rem;font-weight:600;color:var(--olkv-blue);display:block;margin-bottom:0.4rem;">✨ AI-sammendrag</span>
            <span id="ai-oppsummer-tekst">Laster…</span>
          </div>
        </div>`;
      document.getElementById('detaljer-modal').classList.remove('skjult');
      };

    window.lastNedVedlegg = async function(id) {
      const soknad = alleSoknader.find(x => x.id === id);
      if (!soknad?.vedlegg) return;

      try {
        const token = await getToken();
        const res = await fetch(`/api/soknader/${id}/vedlegg`, {
          headers: token ? { Authorization: `Bearer ${token}` } : {}
        });

        if (!res.ok) {
          const json = await res.json().catch(() => ({}));
          throw new Error(json.feil || 'Kunne ikke laste ned CV.');
        }

        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = soknad.vedlegg_originalnavn || 'cv';
        a.click();
        URL.revokeObjectURL(url);
      } catch (err) {
        alert(err.message || 'Kunne ikke laste ned CV.');
      }
    };

    window.settStatus = function(id, status, tekst) {
      document.getElementById('bekreft-tittel').textContent = statusTekst(status);
      document.getElementById('bekreft-tekst').textContent = tekst;
      document.getElementById('bekreft-kommentar').value = '';
      bekreftCallback = async () => {
        const kommentar = document.getElementById('bekreft-kommentar').value.trim();
        await oppdaterSoknadStatusAdmin(id, status, kommentar);
        document.getElementById('bekreft-modal').classList.add('skjult');
        document.getElementById('detaljer-modal').classList.add('skjult');
        await lastSoknader();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = `✓ Status satt til "${statusTekst(status)}"`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
      };
      document.getElementById('bekreft-modal').classList.remove('skjult');
    };

    window.aiOppsummer = async function(soknadId) {
      const boks = document.getElementById('ai-oppsummer-boks');
      const tekst = document.getElementById('ai-oppsummer-tekst');
      const btn = document.getElementById('ai-oppsummer-btn');
      boks.style.display = 'block';
      tekst.textContent = 'Analyserer søknaden…';
      if (btn) btn.disabled = true;

      try {
        const token = await getToken();
        const res = await fetch('/api/ai/oppsummer', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
          body: JSON.stringify({ soknad_id: soknadId })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.feil || 'AI-oppsummering feilet');
        tekst.textContent = data.oppsummering;
      } catch (err) {
        tekst.textContent = err.message || 'Noe gikk galt. Prøv igjen.';
      } finally {
        if (btn) btn.disabled = false;
      }
    };

    document.getElementById('bekreft-ok').addEventListener('click', async () => {
      if (bekreftCallback) { try { await bekreftCallback(); } catch (err) { alert(err.message); } }
    });
    document.getElementById('bekreft-avbryt').addEventListener('click', () => document.getElementById('bekreft-modal').classList.add('skjult'));
    document.getElementById('bekreft-lukk').addEventListener('click', () => document.getElementById('bekreft-modal').classList.add('skjult'));
    document.getElementById('detaljer-lukk').addEventListener('click', () => document.getElementById('detaljer-modal').classList.add('skjult'));
    document.getElementById('detaljer-modal').addEventListener('click', (e) => { if (e.target === e.currentTarget) document.getElementById('detaljer-modal').classList.add('skjult'); });

    let debounceTimer;
    document.getElementById('sok-input').addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(lastSoknader, 300);
    });
    document.getElementById('status-filter').addEventListener('change', lastSoknader);

    await lastSoknader();
    initScrollReveal();
    initVarselBjelle();
  </script>
  <script src="/cookie-banner.js" defer></script>
</body>
</html>
