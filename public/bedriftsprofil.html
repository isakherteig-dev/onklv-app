<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bedriftsprofil — OLKV</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .profil-side {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1.25rem;
    }
    .profil-tilbake {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.88rem;
      color: var(--olkv-gray);
      text-decoration: none;
      margin-bottom: 1.5rem;
      cursor: pointer;
    }
    .profil-tilbake:hover { color: var(--olkv-dark); }
    .profil-header { margin-bottom: 2rem; }
    .profil-header h1 {
      font-size: 1.6rem;
      font-weight: 600;
      margin: 0 0 0.25rem;
    }
    .profil-header .meta {
      font-size: 0.88rem;
      color: var(--olkv-gray);
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
    }
    .profil-seksjon { margin-bottom: 1.75rem; }
    .profil-seksjon h2 {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--olkv-gray);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin: 0 0 0.5rem;
    }
    .profil-seksjon p {
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--olkv-dark);
      margin: 0;
      white-space: pre-line;
    }
    .profil-video {
      width: 100%;
      max-height: 400px;
      border-radius: var(--radius);
      background: var(--olkv-gray-light);
    }
    .profil-plasser {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .profil-plass-kort {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      background: var(--olkv-gray-light);
      border-radius: var(--radius);
      font-size: 0.9rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .profil-plass-kortlenke {
      color: var(--olkv-blue-light);
      text-decoration: none;
      font-weight: 500;
    }
    .profil-plass-kortlenke:hover { text-decoration: underline; }
    .profil-plass-frist {
      font-size: 0.8rem;
      color: var(--olkv-gray);
    }
    .profil-laster {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--olkv-gray);
    }
    .profil-nettside {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--olkv-blue-light);
      font-size: 0.9rem;
    }
    .profil-nettside:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-innhold">
      <a href="/" class="nav-logo">
        <span class="logo-ol">OL</span><span class="logo-kv">KV</span>
      </a>
    </div>
  </nav>

  <main class="profil-side" id="profil-innhold">
    <div class="profil-laster" id="profil-laster">Laster bedriftsprofil…</div>
  </main>

  <script type="module" src="/bedriftsprofil.js"></script>
</body>
</html>
