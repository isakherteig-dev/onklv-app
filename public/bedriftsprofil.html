<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bedriftsprofil — OLKV</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .bp-side {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 1.25rem 3rem;
    }

    /* Tilbake-lenke */
    .bp-tilbake {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.875rem;
      color: var(--olkv-gray);
      text-decoration: none;
      padding: 1rem 1.25rem 0;
      max-width: 760px;
      margin: 0 auto;
      cursor: pointer;
    }
    .bp-tilbake:hover { color: var(--olkv-dark); }

    /* Header-banner */
    .bp-banner {
      background-color: var(--olkv-blue);
      padding: 2rem 1.25rem;
      margin-bottom: 1.5rem;
    }
    .bp-banner-innhold {
      max-width: 760px;
      margin: 0 auto;
    }
    .bp-banner h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #fff;
      margin: 0 0 0.75rem;
    }
    .bp-banner-meta {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .bp-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background-color: rgba(255,255,255,0.15);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 6px;
    }
    .bp-badge-laereplasser {
      background-color: #fff;
      color: var(--olkv-blue);
    }

    /* Seksjoner */
    .bp-seksjoner {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .bp-kort {
      background: var(--olkv-white);
      border: 1px solid var(--olkv-border);
      border-radius: var(--radius);
      padding: 1.25rem;
      box-shadow: var(--skygge);
    }

    .bp-seksjon-tittel {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--olkv-gray);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin: 0 0 0.75rem;
    }
    .bp-seksjon-tittel svg {
      color: var(--olkv-gray);
      flex-shrink: 0;
    }

    .bp-tekst {
      font-size: 0.9375rem;
      line-height: 1.7;
      color: var(--olkv-dark);
      margin: 0;
      white-space: pre-line;
    }

    /* Video */
    .bp-video {
      width: 100%;
      max-height: 400px;
      border-radius: calc(var(--radius) - 2px);
      background: var(--olkv-gray-light);
      display: block;
    }

    /* Nettside */
    .bp-nettside {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.875rem;
      color: var(--olkv-blue-light);
    }
    .bp-nettside:hover { text-decoration: underline; }

    /* Læreplasser */
    .bp-plasser {
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
    }
    .bp-plass-rad {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      background: var(--olkv-gray-light);
      border-radius: calc(var(--radius) - 2px);
      font-size: 0.875rem;
      flex-wrap: wrap;
      gap: 0.5rem;
      text-decoration: none;
      transition: var(--overgang);
    }
    .bp-plass-rad:hover {
      background: var(--color-bg-hover);
      box-shadow: var(--skygge-hover);
    }
    .bp-plass-tittel {
      font-weight: 500;
      color: var(--olkv-blue-light);
    }
    .bp-plass-meta {
      font-size: 0.8rem;
      color: var(--olkv-gray);
    }

    /* Laster */
    .bp-laster {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--olkv-gray);
      font-size: 0.9rem;
    }

    @media (max-width: 480px) {
      .bp-banner { padding: 1.5rem 1rem; }
      .bp-banner h1 { font-size: 1.25rem; }
      .bp-side { padding: 0 1rem 2rem; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-innhold">
      <a href="/" class="nav-logo">
        <span class="logo-ol">OL</span><span class="logo-kv">KV</span>
      </a>
    </div>
  </nav>

  <div id="bp-tilbake-wrapper"></div>
  <div id="bp-banner-wrapper"></div>

  <main class="bp-side" id="profil-innhold">
    <div class="bp-laster" id="profil-laster">Laster bedriftsprofil…</div>
  </main>

  <script type="module" src="/bedriftsprofil.js"></script>
</body>
</html>
