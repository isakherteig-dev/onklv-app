<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrer deg som lærling — OLKV</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body class="login-side">

  <!-- Flytende former (bakgrunn) -->
  <div class="login-shape login-shape-1"></div>
  <div class="login-shape login-shape-2"></div>
  <div class="login-shape login-shape-3"></div>

  <!-- NAVIGASJON -->
  <nav class="login-nav">
    <a href="/" class="nav-logo">
      <span class="logo-ol">OL</span><span class="logo-kv">KV</span>
    </a>
    <a href="/bedrift/registrer.html" style="font-size: 0.875rem;">For bedrifter →</a>
  </nav>

  <!-- INNHOLD -->
  <main style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem 1rem 2rem; position: relative; z-index: 10;">

    <!-- Logo stor -->
    <div class="login-logo-stor" style="margin-bottom: 0.25rem;">
      <span class="logo-ol">OL</span><span class="logo-kv">KV</span>
    </div>
    <p class="login-tagline">Lag din lærlingprofil — det tar under 2 minutter</p>

    <!-- SKJEMA-KORT -->
    <div class="login-kort" style="max-width: 500px;">

      <div id="varsel" class="varsel skjult" style="margin-bottom: 1rem;"></div>

      <form id="registrer-form" novalidate>
        <div class="form-gruppe">
          <label for="navn">Fullt navn *</label>
          <input type="text" id="navn" name="navn" placeholder="Ola Nordmann" autocomplete="name" required />
        </div>

        <div class="form-gruppe">
          <label for="epost">E-postadresse *</label>
          <input type="email" id="epost" name="epost" placeholder="ola@example.no" autocomplete="email" required />
        </div>

        <div class="form-gruppe">
          <label for="utdanningsprogram">Utdanningsprogram *</label>
          <select id="utdanningsprogram" name="utdanningsprogram" required>
            <option value="" disabled selected>Velg utdanningsprogram</option>
            <option value="elektrofag">Elektrofag</option>
            <option value="tip">Teknikk og industriell produksjon (TIP)</option>
            <option value="bygg">Bygg og anleggsteknikk</option>
            <option value="restaurant">Restaurant og matfag</option>
            <option value="helse">Helse og oppvekstfag</option>
            <option value="ikt">Informasjonsteknologi og medieproduksjon (IKT)</option>
            <option value="naturbruk">Naturbruk</option>
            <option value="design">Design og håndverk</option>
            <option value="medier">Medier og kommunikasjon</option>
            <option value="annet">Annet</option>
          </select>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-gruppe">
            <label for="passord">Passord *</label>
            <input type="password" id="passord" name="passord" placeholder="Minst 8 tegn" autocomplete="new-password" required minlength="8" />
          </div>
          <div class="form-gruppe">
            <label for="passord-bekreft">Bekreft passord *</label>
            <input type="password" id="passord-bekreft" name="passord-bekreft" placeholder="Gjenta passord" autocomplete="new-password" required />
          </div>
        </div>

        <div class="form-gruppe">
          <label for="bio">Kort om deg <span style="font-weight: 400; color: var(--olkv-gray);">(valgfritt)</span></label>
          <textarea id="bio" name="bio" placeholder="Fortell litt om deg selv og hva du ønsker å lære..." style="min-height: 90px;"></textarea>
        </div>

        <button type="submit" class="btn btn-primary btn-puls" style="width: 100%;" id="send-btn">
          Opprett profil →
        </button>
      </form>

      <p style="font-size: 0.82rem; text-align: center; color: var(--olkv-gray); margin-top: 1.5rem;">
        Allerede registrert? <a href="/login.html">Logg inn</a>
        &nbsp;·&nbsp;
        Er du en bedrift? <a href="/bedrift/registrer.html">Registrer bedrift</a>
      </p>
    </div>
  </main>

  <!-- FOOTER -->
  <footer style="position: relative; z-index: 10; text-align: center; padding: 1.25rem; color: rgba(255,255,255,0.35); font-size: 0.78rem;">
    © 2026 OLKV / Opplæringskontoret i Vestland &nbsp;·&nbsp;
    <a href="#" style="color: rgba(255,255,255,0.45);">Personvern</a>
  </footer>

  <script type="module">
    import { registrerLaerling, visFeilmelding, visBekreftelse, erInnlogget } from '../app.js';

    if (erInnlogget()) window.location.href = '/laerling/dashboard.html';

    const form = document.getElementById('registrer-form');
    const sendBtn = document.getElementById('send-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const navn = document.getElementById('navn').value.trim();
      const epost = document.getElementById('epost').value.trim();
      const utdanningsprogram = document.getElementById('utdanningsprogram').value;
      const passord = document.getElementById('passord').value;
      const passordBekreft = document.getElementById('passord-bekreft').value;
      const bio = document.getElementById('bio').value.trim();

      if (!navn || !epost || !utdanningsprogram || !passord) {
        visFeilmelding('Fyll ut alle påkrevde felter');
        return;
      }
      if (passord.length < 8) {
        visFeilmelding('Passordet må være minst 8 tegn');
        return;
      }
      if (passord !== passordBekreft) {
        visFeilmelding('Passordene stemmer ikke overens');
        return;
      }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(epost)) {
        visFeilmelding('Skriv inn en gyldig e-postadresse');
        return;
      }

      sendBtn.disabled = true;
      sendBtn.textContent = 'Oppretter profil…';

      try {
        await registrerLaerling({ navn, epost, passord, utdanningsprogram, bio });
        visBekreftelse('Profilen er opprettet! Du sendes til dashbordet ditt…');
        setTimeout(() => { window.location.href = '/laerling/dashboard.html'; }, 1000);
      } catch (err) {
        visFeilmelding(err.message || 'Noe gikk galt. Prøv igjen.');
        sendBtn.disabled = false;
        sendBtn.textContent = 'Opprett profil →';
      }
    });
  </script>
</body>
</html>
