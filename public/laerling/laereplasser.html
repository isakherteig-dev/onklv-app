<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finn læreplasser — OLKV</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>

  <nav class="nav">
    <div class="nav-innhold">
      <a href="/" class="nav-logo">
        <span class="logo-ol">OL</span><span class="logo-kv">KV</span>
      </a>
      <div class="nav-lenker" style="gap:0.5rem;align-items:center;">
        <span id="nav-navn" style="font-size:0.9rem;color:var(--farge-tekst-sekundaer);"></span>
        <div class="varsel-dropdown-wrapper">
          <button class="varsel-bjelle" id="varsel-bjelle" aria-label="Varsler">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span class="varsel-bjelle-badge" id="varsel-count" style="display:none;"></span>
          </button>
          <div class="varsel-dropdown skjult" id="varsel-dropdown">
            <div class="varsel-dropdown-header">Varsler</div>
          </div>
        </div>
        <a href="/laerling/profil.html" id="nav-avatar" title="Min profil" style="width:34px;height:34px;border-radius:50%;background:var(--olkv-blue);color:white;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:700;font-size:0.85rem;text-decoration:none;flex-shrink:0;transition:opacity 0.2s;" onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">?</a>
        <button class="btn btn-ghost btn-liten" id="logg-ut-btn">Logg ut</button>
      </div>
    </div>
  </nav>

  <div class="dashboard-layout">
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <div class="sidebar-seksjon-tittel">Meny</div>
        <a href="/laerling/dashboard.html" class="sidebar-lenke">
          <span class="sidebar-ikon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span> Dashbord
        </a>
        <a href="/laerling/laereplasser.html" class="sidebar-lenke aktiv">
          <span class="sidebar-ikon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span> Finn læreplasser
        </a>
        <a href="/laerling/mine-soknader.html" class="sidebar-lenke">
          <span class="sidebar-ikon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span> Mine søknader
        </a>
        <a href="/laerling/dashboard.html#profil" class="sidebar-lenke">
          <span class="sidebar-ikon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span> Min profil
        </a>
      </nav>
    </aside>

    <main class="hoveddel page-content">
      <div class="rad reveal" style="margin-bottom:2rem;justify-content:space-between;flex-wrap:wrap;gap:1rem;">
        <div>
          <h1 style="font-size:1.75rem;">Ledige læreplasser</h1>
          <p style="color:var(--farge-tekst-sekundaer);" id="antall-tekst">Laster læreplasser…</p>
        </div>
        <button id="ai-match-btn" class="btn btn-primary" onclick="kjorAiMatch()">
          ✨ AI-anbefalinger for deg
        </button>
      </div>

      <!-- AI MATCH RESULTAT -->
      <div id="ai-match-panel" class="skjult" style="margin-bottom:2rem;background:linear-gradient(135deg,#1e3a5f,#2d5a9e);border-radius:var(--radius);padding:1.25rem 1.5rem;color:#fff;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:0.5rem;">
          <div style="display:flex;align-items:center;gap:0.6rem;">
            <span style="font-size:1.2rem;">✨</span>
            <strong style="font-size:1rem;">AI-anbefalinger basert på din profil</strong>
          </div>
          <button onclick="lukkAiMatch()" style="background:rgba(255,255,255,0.15);border:none;color:#fff;padding:0.3rem 0.8rem;border-radius:var(--radius-pill);cursor:pointer;font-size:0.82rem;">Lukk ✕</button>
        </div>
        <div id="ai-match-liste" style="display:flex;flex-direction:column;gap:0.6rem;"></div>
      </div>

      <!-- FILTER -->
      <div class="filter-bar reveal">
        <div class="search-field">
          <input
            type="text"
            id="search-input"
            class="input"
            placeholder="Søk etter læreplass, bedrift eller fag..."
          />
        </div>

        <div class="filter-group">
          <select id="filter-fagomraade" class="input">
            <option value="">Alle fagområder</option>
          </select>

          <select id="filter-sted" class="input">
            <option value="">Alle steder</option>
          </select>

          <select id="filter-bransje" class="input">
            <option value="">Alle bransjer</option>
          </select>
        </div>

        <div class="filter-results">
          <span id="result-count">Viser alle læreplasser</span>
          <button type="button" id="reset-filters-btn" class="btn-text">Nullstill filtre</button>
        </div>
      </div>

      <!-- VARSELMELDINGER -->
      <div id="varsel" class="varsel skjult"></div>

      <!-- LÆREPLASSER-LISTE -->
      <div class="rutenett-2" id="laereplasser-liste">
        <div class="skeleton" style="height:220px;border-radius:var(--radius);"></div>
        <div class="skeleton" style="height:220px;border-radius:var(--radius);"></div>
        <div class="skeleton" style="height:220px;border-radius:var(--radius);"></div>
        <div class="skeleton" style="height:220px;border-radius:var(--radius);"></div>
      </div>
    </main>
  </div>

  <!-- SØKNADSSKJEMA MODAL -->
  <div class="modal-bakgrunn skjult" id="soknad-modal">
    <div class="modal" style="max-width:560px;">
      <div class="modal-hode">
        <h3 class="modal-tittel" id="modal-laereplasstitle">Søk på læreplassen</h3>
        <button class="modal-lukk" id="modal-lukk-btn">&times;</button>
      </div>
      <div class="modal-kropp">
        <div id="soknad-varsel" class="varsel skjult"></div>
        <form id="soknad-form">
          <input type="hidden" id="soknad-laerplass-id" />
          <div class="form-gruppe">
            <label class="etikett" for="soknad-motivasjon">Motivasjon <span style="color:var(--olkv-red);">*</span></label>
            <textarea id="soknad-motivasjon" class="input" rows="5" placeholder="Fortell hvorfor du ønsker denne læreplassen og hva du kan bidra med (minst 50 tegn)…" required></textarea>
            <div class="hint" id="motivasjon-tegnteller">0 tegn</div>
          </div>
          <div class="form-gruppe">
            <label class="etikett" for="soknad-erfaring">Relevant erfaring</label>
            <textarea id="soknad-erfaring" class="input" rows="3" placeholder="Deltidsjobb, prosjekter, frivillighet, osv. (valgfritt)…"></textarea>
          </div>
          <div class="rutenett-2" style="gap:0.75rem;">
            <div class="form-gruppe">
              <label class="etikett" for="soknad-vg1">VG1-kurs</label>
              <input type="text" id="soknad-vg1" class="input" placeholder="f.eks. Service og samferdsel" />
            </div>
            <div class="form-gruppe">
              <label class="etikett" for="soknad-vg2">VG2-kurs</label>
              <input type="text" id="soknad-vg2" class="input" placeholder="f.eks. Salg, service og reiseliv" />
            </div>
          </div>
          <div class="form-gruppe">
            <label class="etikett" for="soknad-telefon">Telefonnummer</label>
            <input type="tel" id="soknad-telefon" class="input" placeholder="f.eks. 99887766" />
          </div>
          <div class="form-gruppe">
            <label class="etikett" for="soknad-cv">CV</label>
            <label for="soknad-cv" class="btn btn-ghost btn-liten" style="display:inline-flex;width:max-content;">
              Last opp CV (valgfritt)
            </label>
            <input
              type="file"
              id="soknad-cv"
              accept=".pdf,.docx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
              style="position:absolute;left:-9999px;"
            />
            <div class="hint" id="soknad-cv-navn">Ingen fil valgt</div>
            <div class="hint">Kun PDF eller DOCX. Maks 5 MB.</div>
          </div>
          <button type="submit" class="btn btn-primary" id="soknad-send-btn" style="width:100%;margin-top:0.5rem;">Send søknad</button>
        </form>
      </div>
    </div>
  </div>

  <script type="module">
    import {
      krevInnlogging, loggUt, hentLaereplasser, sendSoknadFull,
      statusTekst, formaterDato, initScrollReveal, fagomraader,
      visFeilmelding, visBekreftelse, initVarselBjelle, initialFra,
      getToken
    } from '../app.js';

    let bruker = null;
    let allePlasser = [];
    let minneSoknaderIds = new Set();
    let filterRenderTimeout = null;
    const MAKS_CV_STORRELSE = 5 * 1024 * 1024;
    const TILLATTE_CV_TYPER = [
      'application/pdf',
      'application/vnd.openxmlformats-officedocument.wordprocessingml.document'
    ];
    const TILLATTE_CV_ENDINGER = ['.pdf', '.docx'];
    const KJENTE_STEDER = ['Bergen', 'Voss', 'Stord', 'Odda', 'Førde', 'Sogndal'];
    const FAGOMRAADE_ALIASER = {
      Elektrofag: 'Elektro og datateknologi',
      Helsefag: 'Helse- og oppvekstfag',
      Byggfag: 'Bygg- og anleggsteknikk',
      Restaurantfag: 'Restaurant- og matfag',
      'Salg og service': 'Salg, service og reiseliv',
      'Teknologi og industrifag': 'Teknologi- og industrifag',
      'IT og medieproduksjon': 'Informasjonsteknologi og medieproduksjon'
    };

    bruker = await krevInnlogging('laerling');
    if (!bruker) { window.location.href = '/login.html'; }

    document.getElementById('nav-navn').textContent = bruker.navn || '';
    const navAvatar = document.getElementById('nav-avatar');
    if (navAvatar) navAvatar.textContent = initialFra(bruker.navn);
    document.getElementById('logg-ut-btn').addEventListener('click', async () => { await loggUt(); });

    // Fyll fagomraade-filter
    const fagSelect = document.getElementById('filter-fagomraade');
    fagomraader.forEach(f => {
      const opt = document.createElement('option');
      opt.value = f; opt.textContent = f;
      fagSelect.appendChild(opt);
    });

    const stedSelect = document.getElementById('filter-sted');
    [...KJENTE_STEDER, 'Annet'].forEach(sted => {
      const opt = document.createElement('option');
      opt.value = sted;
      opt.textContent = sted === 'Annet' ? 'Annet sted' : sted;
      stedSelect.appendChild(opt);
    });

    // Hent mine søknader (for å vise "Allerede søkt"-badge)
    try {
      const { getToken } = await import('../app.js');
      const token = await getToken();
      const res = await fetch('/api/soknader/mine', { headers: { Authorization: `Bearer ${token}` } });
      if (res.ok) {
        const mine = await res.json();
        mine.forEach(s => minneSoknaderIds.add(s.laerplass_id));
      }
    } catch {}

    allePlasser = await hentLaereplasser();
    const bransjeSelect = document.getElementById('filter-bransje');
    [...new Set(allePlasser.map((plass) => (plass.bransje || '').trim()).filter(Boolean))]
      .sort((a, b) => a.localeCompare(b, 'nb'))
      .forEach((bransje) => {
        const opt = document.createElement('option');
        opt.value = bransje;
        opt.textContent = bransje;
        bransjeSelect.appendChild(opt);
      });
    visPlasser(allePlasser);
    oppdaterResultatTekst(allePlasser.length, allePlasser.length);

    document.getElementById('search-input').addEventListener('input', filterLaereplasser);
    document.getElementById('filter-fagomraade').addEventListener('change', filterLaereplasser);
    document.getElementById('filter-sted').addEventListener('change', filterLaereplasser);
    document.getElementById('filter-bransje').addEventListener('change', filterLaereplasser);
    document.getElementById('reset-filters-btn').addEventListener('click', resetFilters);

    function hentFagtekst(plass) {
      return (plass.fagomraade || plass.bransje || 'Annet').trim();
    }

    function hentStedtekst(plass) {
      return (plass.sted || '').trim();
    }

    function hentFagFilterVerdi(plass) {
      const fagtekst = hentFagtekst(plass);
      return FAGOMRAADE_ALIASER[fagtekst] || fagtekst;
    }

    function normaliserTekst(tekst) {
      return (tekst || '')
        .toLowerCase()
        .normalize('NFKD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/æ/g, 'ae')
        .replace(/ø/g, 'o')
        .replace(/å/g, 'a');
    }

    function oppdaterResultatTekst(antall, totalt) {
      const countEl = document.getElementById('result-count');
      if (antall === totalt) {
        countEl.textContent = `Viser alle læreplasser (${antall})`;
        return;
      }
      countEl.textContent = `Viser ${antall} av ${totalt} læreplasser`;
    }

    function animertVisPlasser(plasser) {
      const container = document.getElementById('laereplasser-liste');
      const eksisterendeKort = container.querySelectorAll('.laereplass-kort, .tom-tilstand');

      if (!eksisterendeKort.length) {
        visPlasser(plasser, { animer: true });
        return;
      }

      eksisterendeKort.forEach((kort) => kort.classList.add('kort-filter-ut'));
      clearTimeout(filterRenderTimeout);
      filterRenderTimeout = setTimeout(() => {
        visPlasser(plasser, { animer: true });
      }, 180);
    }

    function filterLaereplasser() {
      const soketekst = normaliserTekst(document.getElementById('search-input').value.trim());
      const fagomraade = document.getElementById('filter-fagomraade').value;
      const sted = document.getElementById('filter-sted').value;
      const bransje = document.getElementById('filter-bransje').value;

      const filtrert = allePlasser.filter((plass) => {
        const fagtekst = hentFagtekst(plass);
        const fagFilterVerdi = hentFagFilterVerdi(plass);
        const stedtekst = hentStedtekst(plass);
        const matcherSok = !soketekst
          || normaliserTekst(plass.tittel).includes(soketekst)
          || normaliserTekst(plass.bedrift_navn).includes(soketekst)
          || normaliserTekst(fagtekst).includes(soketekst)
          || normaliserTekst(fagFilterVerdi).includes(soketekst)
          || normaliserTekst(plass.bransje).includes(soketekst)
          || normaliserTekst(plass.beskrivelse).includes(soketekst);

        const matcherFag = !fagomraade
          || (fagomraade === 'Annet'
            ? !fagomraader.includes(fagFilterVerdi)
            : fagFilterVerdi === fagomraade);

        const matcherSted = !sted
          || (sted === 'Annet'
            ? !!stedtekst && !KJENTE_STEDER.includes(stedtekst)
            : stedtekst === sted);

        const matcherBransje = !bransje || (plass.bransje || '').trim() === bransje;

        return matcherSok && matcherFag && matcherSted && matcherBransje;
      });

      oppdaterResultatTekst(filtrert.length, allePlasser.length);
      animertVisPlasser(filtrert);
    }

    function resetFilters() {
      document.getElementById('search-input').value = '';
      document.getElementById('filter-fagomraade').value = '';
      document.getElementById('filter-sted').value = '';
      document.getElementById('filter-bransje').value = '';
      filterLaereplasser();
    }

    function dagertilFrist(fristStr) {
      if (!fristStr) return null;
      const frist = new Date(fristStr + 'T00:00:00');
      const naa = new Date();
      naa.setHours(0,0,0,0);
      return Math.ceil((frist - naa) / (1000 * 60 * 60 * 24));
    }

    function fristBadge(fristStr) {
      const dager = dagertilFrist(fristStr);
      if (dager === null) return '';
      if (dager < 0) return `<span class="frist-badge utlopt">Utløpt</span>`;
      if (dager === 0) return `<span class="frist-badge snart">Frist i dag!</span>`;
      if (dager <= 7) return `<span class="frist-badge snart">${dager} dager igjen</span>`;
      return `<span class="frist-badge ok">Frist: ${formaterDato(fristStr)}</span>`;
    }

    function visPlasser(plasser, { animer = false } = {}) {
      const container = document.getElementById('laereplasser-liste');
      document.getElementById('antall-tekst').textContent = `${allePlasser.length} læreplasser tilgjengelig`;

      if (!plasser.length) {
        container.innerHTML = `
          <div class="tom-tilstand kort-filter-inn" style="grid-column:1/-1;">
            <div class="tom-tilstand-ikon">🔍</div>
            <h3>Ingen læreplasser matcher søket ditt</h3>
            <p>Prøv å endre søket eller nullstille filtrene.</p>
          </div>`;
        return;
      }

      const dager = (p) => dagertilFrist(p.frist);

      container.innerHTML = plasser.map(p => {
        const utlopt = dager(p) !== null && dager(p) < 0;
        const harSokt = minneSoknaderIds.has(p.id);
        const fagtekst = hentFagtekst(p);
        const fagBadge = fagtekst ? `<span class="badge badge-blaa">${fagtekst}</span>` : '';
        return `
          <div class="kort laereplass-kort${animer ? ' kort-filter-inn' : ''}${utlopt ? ' opacity-50' : ''}">
            <div class="kort-header">
              <div>
                <div class="kort-tittel">${p.tittel}</div>
                <div class="kort-undertittel">${p.bedrift_navn || '—'}</div>
              </div>
              ${fagBadge}
            </div>
            <p style="font-size:0.88rem;margin:0.75rem 0;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;color:var(--farge-tekst-sekundaer);">${p.beskrivelse || 'Ingen beskrivelse tilgjengelig.'}</p>
            <div style="display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center;margin-bottom:1rem;">
              ${p.sted ? `<span style="font-size:0.82rem;color:var(--olkv-gray);">📍 ${p.sted}</span>` : ''}
              ${fristBadge(p.frist)}
            </div>
            <div class="kort-footer">
              <div></div>
              ${harSokt
                ? `<span class="badge badge-godkjent">Allerede søkt ✓</span>`
                : utlopt
                  ? `<span class="badge badge-trukket">Utløpt</span>`
                  : `<button class="btn btn-primary btn-liten" onclick="apneSoknadModal(${p.id}, '${p.tittel.replace(/'/g, "\\'")}')">Søk nå →</button>`
              }
            </div>
          </div>`;
      }).join('');
    }

    function oppdaterCvTekst(fil) {
      document.getElementById('soknad-cv-navn').textContent = fil ? `Valgt fil: ${fil.name}` : 'Ingen fil valgt';
    }

    function nullstillCvFelt() {
      const input = document.getElementById('soknad-cv');
      input.value = '';
      oppdaterCvTekst(null);
    }

    function validerCvFil(fil) {
      if (!fil) return null;

      const filnavn = fil.name || '';
      const ext = filnavn.slice(filnavn.lastIndexOf('.')).toLowerCase();
      const gyldigType = TILLATTE_CV_TYPER.includes(fil.type) && TILLATTE_CV_ENDINGER.includes(ext);

      if (!gyldigType) {
        return 'Kun PDF og DOCX-filer er tillatt.';
      }
      if (fil.size > MAKS_CV_STORRELSE) {
        return 'CV-en er for stor. Maks filstørrelse er 5 MB.';
      }

      return null;
    }

    // Modal
    window.apneSoknadModal = function(id, tittel) {
      document.getElementById('soknad-laerplass-id').value = id;
      document.getElementById('modal-laereplasstitle').textContent = `Søk på: ${tittel}`;
      document.getElementById('soknad-form').reset();
      nullstillCvFelt();
      document.getElementById('motivasjon-tegnteller').textContent = '0 tegn';
      document.getElementById('soknad-varsel').classList.add('skjult');
      if (bruker?.telefon) document.getElementById('soknad-telefon').value = bruker.telefon;
      if (bruker?.utdanningsprogram) document.getElementById('soknad-vg2').value = bruker.utdanningsprogram;
      document.getElementById('soknad-modal').classList.remove('skjult');
    };

    document.getElementById('soknad-motivasjon').addEventListener('input', (e) => {
      document.getElementById('motivasjon-tegnteller').textContent = `${e.target.value.length} tegn`;
    });

    document.getElementById('soknad-cv').addEventListener('change', (e) => {
      const fil = e.target.files[0] || null;
      const feil = validerCvFil(fil);
      if (feil) {
        e.target.value = '';
        oppdaterCvTekst(null);
        document.getElementById('soknad-varsel').className = 'varsel varsel-feil';
        document.getElementById('soknad-varsel').textContent = feil;
        document.getElementById('soknad-varsel').classList.remove('skjult');
        return;
      }

      oppdaterCvTekst(fil);
      if (fil) {
        document.getElementById('soknad-varsel').classList.add('skjult');
      }
    });

    document.getElementById('modal-lukk-btn').addEventListener('click', () => {
      document.getElementById('soknad-modal').classList.add('skjult');
    });
    document.getElementById('soknad-modal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) document.getElementById('soknad-modal').classList.add('skjult');
    });

    document.getElementById('soknad-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('soknad-send-btn');
      const motivasjon = document.getElementById('soknad-motivasjon').value.trim();
      const cvFil = document.getElementById('soknad-cv').files[0] || null;
      if (motivasjon.length < 50) {
        document.getElementById('soknad-varsel').className = 'varsel varsel-feil';
        document.getElementById('soknad-varsel').textContent = 'Motivasjonen må være minst 50 tegn.';
        document.getElementById('soknad-varsel').classList.remove('skjult');
        return;
      }
      const vedleggFeil = validerCvFil(cvFil);
      if (vedleggFeil) {
        document.getElementById('soknad-varsel').className = 'varsel varsel-feil';
        document.getElementById('soknad-varsel').textContent = vedleggFeil;
        document.getElementById('soknad-varsel').classList.remove('skjult');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Sender…';

      try {
        const formData = new FormData();
        formData.append('laerplass_id', document.getElementById('soknad-laerplass-id').value);
        formData.append('melding', motivasjon);
        formData.append('erfaring', document.getElementById('soknad-erfaring').value.trim());
        formData.append('vg1', document.getElementById('soknad-vg1').value.trim());
        formData.append('vg2', document.getElementById('soknad-vg2').value.trim());
        formData.append('telefon', document.getElementById('soknad-telefon').value.trim());
        if (cvFil) {
          formData.append('vedlegg', cvFil);
        }

        await sendSoknadFull(formData);

        const plassId = parseInt(document.getElementById('soknad-laerplass-id').value);
        minneSoknaderIds.add(plassId);

        document.getElementById('soknad-modal').classList.add('skjult');
        nullstillCvFelt();
        filterLaereplasser();

        // Vis toast
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = cvFil ? '✓ Søknaden din med CV er sendt!' : '✓ Søknaden din er sendt!';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);

      } catch (err) {
        document.getElementById('soknad-varsel').className = 'varsel varsel-feil';
        document.getElementById('soknad-varsel').textContent = err.message;
        document.getElementById('soknad-varsel').classList.remove('skjult');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send søknad';
      }
    });

    window.kjorAiMatch = async function() {
      const btn = document.getElementById('ai-match-btn');
      const panel = document.getElementById('ai-match-panel');
      const liste = document.getElementById('ai-match-liste');

      btn.disabled = true;
      btn.textContent = '⏳ Analyserer profilen din…';
      liste.innerHTML = `
        <div class="skeleton" style="height:56px;border-radius:var(--radius);background:rgba(255,255,255,0.15);margin-bottom:0;"></div>
        <div class="skeleton" style="height:56px;border-radius:var(--radius);background:rgba(255,255,255,0.15);margin-bottom:0;"></div>
        <div class="skeleton" style="height:56px;border-radius:var(--radius);background:rgba(255,255,255,0.15);"></div>`;
      panel.classList.remove('skjult');

      try {
        const token = await getToken();
        const res = await fetch('/api/ai/match', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` }
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.feil || 'Noe gikk galt');

        const resultater = (data.resultater || []).slice(0, 5);
        if (!resultater.length) {
          liste.innerHTML = `<p style="opacity:0.8;margin:0;">Ingen læreplasser å matche mot akkurat nå.</p>`;
        } else {
          liste.innerHTML = resultater.map(r => {
            const plass = allePlasser.find(p => p.id === r.laerplass_id);
            if (!plass) return '';
            const scoreFarge = r.score >= 75 ? '#4ade80' : r.score >= 50 ? '#facc15' : '#fb923c';
            return `
              <div style="display:flex;align-items:center;gap:1rem;background:rgba(255,255,255,0.1);border-radius:var(--radius);padding:0.75rem 1rem;flex-wrap:wrap;">
                <div style="text-align:center;min-width:48px;">
                  <div style="font-size:1.2rem;font-weight:700;color:${scoreFarge};">${r.score}</div>
                  <div style="font-size:0.65rem;opacity:0.7;">match</div>
                </div>
                <div style="flex:1;min-width:180px;">
                  <div style="font-weight:600;font-size:0.9rem;">${plass.tittel}</div>
                  <div style="font-size:0.8rem;opacity:0.75;">${plass.bedrift_navn || ''} ${plass.sted ? '· ' + plass.sted : ''}</div>
                  <div style="font-size:0.78rem;opacity:0.7;margin-top:2px;">${r.begrunnelse || ''}</div>
                </div>
                ${!minneSoknaderIds.has(plass.id)
                  ? `<button class="btn btn-primary btn-liten" style="flex-shrink:0;" onclick="apneSoknadModal(${plass.id}, '${plass.tittel.replace(/'/g, "\\'")}')">Søk nå →</button>`
                  : `<span class="badge badge-godkjent" style="flex-shrink:0;">Søkt ✓</span>`
                }
              </div>`;
          }).join('');
        }
      } catch (err) {
        liste.innerHTML = `<p style="opacity:0.8;margin:0;">⚠️ ${err.message}</p>`;
      } finally {
        btn.disabled = false;
        btn.textContent = '✨ AI-anbefalinger for deg';
      }
    };

    window.lukkAiMatch = function() {
      document.getElementById('ai-match-panel').classList.add('skjult');
    };

    initScrollReveal();
    initVarselBjelle();
  </script>
  <script src="/cookie-banner.js" defer></script>
</body>
</html>
