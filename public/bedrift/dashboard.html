<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bedriftsdashbord — Perfect Match</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>

  <!-- NAVIGASJON -->
  <nav class="nav">
    <div class="nav-innhold">
      <a href="/" class="nav-logo">✦ Perfect Match</a>
      <div class="nav-lenker">
        <span style="font-size: 0.9rem; color: var(--farge-tekst-sekundaer);">Bergen Elektro AS</span>
        <button class="btn btn-ghost btn-liten" id="logg-ut-btn">Logg ut</button>
      </div>
    </div>
  </nav>

  <!-- DASHBOARD LAYOUT -->
  <div class="dashboard-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <div class="sidebar-seksjon-tittel">Meny</div>
        <a href="/bedrift/dashboard.html" class="sidebar-lenke aktiv">
          <span class="sidebar-ikon">🏠</span> Dashbord
        </a>
        <a href="#annonser" class="sidebar-lenke">
          <span class="sidebar-ikon">📢</span> Mine annonser
        </a>
        <a href="#soknader" class="sidebar-lenke">
          <span class="sidebar-ikon">📋</span> Søknader
        </a>
        <a href="#profil" class="sidebar-lenke">
          <span class="sidebar-ikon">🏢</span> Bedriftsprofil
        </a>
        <div class="sidebar-seksjon-tittel">Hjelp</div>
        <a href="#" class="sidebar-lenke">
          <span class="sidebar-ikon">❓</span> Veiledning</a>
      </nav>
    </aside>

    <!-- HOVEDDEL -->
    <main class="hoveddel">

      <!-- HILSEN -->
      <div class="rad" style="margin-bottom: 2rem; justify-content: space-between; flex-wrap: wrap; gap: 1rem;">
        <div>
          <h1 style="font-size: 1.75rem;">Hei, Bergen Elektro! 👋</h1>
          <p>Her er en oversikt over annonser og innkomne søknader.</p>
        </div>
        <button class="btn btn-primary" id="ny-annonse-btn">+ Ny læreplassannonse</button>
      </div>

      <!-- STATS -->
      <div class="rutenett-4" style="margin-bottom: 2.5rem;" id="stats-rad">
        <!-- Fylles av JS -->
      </div>

      <!-- VARSEL -->
      <div id="varsel" class="varsel skjult"></div>

      <!-- MINE ANNONSER -->
      <section id="annonser" style="margin-bottom: 2.5rem;">
        <div class="rad" style="justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 0.5rem;">
          <h2 style="font-size: 1.3rem;">Mine læreplassannonser</h2>
        </div>
        <div id="annonser-liste" class="rutenett-2">
          <!-- Fylles av JS -->
        </div>
      </section>

      <!-- INNKOMNE SØKNADER -->
      <section id="soknader">
        <div class="rad" style="justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 0.5rem;">
          <h2 style="font-size: 1.3rem;">Innkomne søknader</h2>
          <div class="rad" style="gap: 0.5rem;">
            <select id="status-filter" style="min-height: 36px; font-size: 0.875rem; padding: 0.35rem 2rem 0.35rem 0.75rem; width: auto;">
              <option value="">Alle statuser</option>
              <option value="sendt">Sendt</option>
              <option value="under_vurdering">Under vurdering</option>
              <option value="akseptert">Akseptert</option>
              <option value="avvist">Avvist</option>
            </select>
          </div>
        </div>
        <div id="soknader-liste">
          <!-- Fylles av JS -->
        </div>
      </section>

    </main>
  </div>

  <!-- NY ANNONSE MODAL -->
  <div id="annonse-modal" class="modal-bakgrunn skjult">
    <div class="modal">
      <div class="modal-header">
        <h3>Ny læreplassannonse</h3>
        <button class="modal-lukk" id="annonse-modal-lukk">✕</button>
      </div>
      <div id="varsel-modal" class="varsel skjult"></div>
      <form id="annonse-form">
        <div class="form-gruppe">
          <label for="ann-tittel">Tittel *</label>
          <input type="text" id="ann-tittel" placeholder="f.eks. Elektriker-lærling" required />
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-gruppe">
            <label for="ann-plasser">Antall plasser *</label>
            <input type="number" id="ann-plasser" min="1" max="20" value="1" required />
          </div>
          <div class="form-gruppe">
            <label for="ann-frist">Søknadsfrist *</label>
            <input type="date" id="ann-frist" required />
          </div>
        </div>
        <div class="form-gruppe">
          <label for="ann-beskrivelse">Beskrivelse *</label>
          <textarea id="ann-beskrivelse" placeholder="Beskriv læreplassen, arbeidsoppgaver og hva du ser etter..." required></textarea>
        </div>
        <div class="rad" style="justify-content: flex-end; gap: 0.75rem; margin-top: 0.5rem;">
          <button type="button" class="btn btn-ghost" id="annonse-modal-avbryt">Avbryt</button>
          <button type="submit" class="btn btn-primary">Publiser annonse</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import {
      hentMineAnnonser,
      hentSoknaderBedrift,
      formaterDato,
      statusTekst,
      statusBadgeKlasse,
      visBekreftelse,
      visFeilmelding,
      loggUt
    } from '../app.js';

    let alleSoknader = [];

    async function lastStats(annonser, soknader) {
      const aktive = annonser.filter(a => a.aktiv).length;
      const innkomne = soknader.length;
      const underVurdering = soknader.filter(s => s.status === 'under_vurdering').length;
      const aksepterte = soknader.filter(s => s.status === 'akseptert').length;

      document.getElementById('stats-rad').innerHTML = `
        <div class="stat-boks">
          <div class="stat-tall">${aktive}</div>
          <div class="stat-etikett">Aktive annonser</div>
        </div>
        <div class="stat-boks">
          <div class="stat-tall">${innkomne}</div>
          <div class="stat-etikett">Innkomne søknader</div>
        </div>
        <div class="stat-boks">
          <div class="stat-tall">${underVurdering}</div>
          <div class="stat-etikett">Under vurdering</div>
        </div>
        <div class="stat-boks">
          <div class="stat-tall">${aksepterte}</div>
          <div class="stat-etikett">Akseptert</div>
        </div>
      `;
    }

    async function lastAnnonser() {
      const annonser = await hentMineAnnonser();
      const container = document.getElementById('annonser-liste');

      if (annonser.length === 0) {
        container.innerHTML = `
          <div class="kort" style="grid-column: 1 / -1; text-align: center; padding: 2.5rem;">
            <div style="font-size: 3rem; margin-bottom: 1rem;">📢</div>
            <h3 style="margin-bottom: 0.5rem;">Ingen annonser ennå</h3>
            <p style="margin-bottom: 1.5rem;">Legg ut din første læreplassannonse for å motta søknader.</p>
            <button class="btn btn-primary" onclick="document.getElementById('ny-annonse-btn').click()">+ Ny annonse</button>
          </div>
        `;
        return annonser;
      }

      container.innerHTML = annonser.map(a => `
        <div class="kort">
          <div class="kort-header">
            <div>
              <div class="kort-tittel">${a.tittel}</div>
              <div class="kort-undertittel">Frist: ${formaterDato(a.frist)}</div>
            </div>
            <span class="badge ${a.aktiv ? 'badge-gronn' : 'badge-graa'}">${a.aktiv ? 'Aktiv' : 'Inaktiv'}</span>
          </div>
          <div style="display: flex; gap: 1.5rem; font-size: 0.875rem; color: var(--farge-tekst-sekundaer); margin-bottom: 1rem; flex-wrap: wrap;">
            <span>👥 ${a.antall_plasser} plass${a.antall_plasser !== 1 ? 'er' : ''}</span>
            <span>📨 ${a.antall_soknader} søknad${a.antall_soknader !== 1 ? 'er' : ''}</span>
          </div>
          <div class="rad" style="gap: 0.5rem;">
            <button class="btn btn-ghost btn-liten">✏️ Rediger</button>
            <button class="btn btn-ghost btn-liten" style="color: var(--farge-feil);">🗑 Slett</button>
          </div>
        </div>
      `).join('');

      return annonser;
    }

    async function lastSoknader(filter = '') {
      alleSoknader = await hentSoknaderBedrift();
      const soknader = filter ? alleSoknader.filter(s => s.status === filter) : alleSoknader;
      const container = document.getElementById('soknader-liste');

      if (soknader.length === 0) {
        container.innerHTML = `
          <div class="kort" style="text-align: center; padding: 2rem;">
            <p>Ingen søknader${filter ? ` med status «${statusTekst(filter)}»` : ''} ennå.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = soknader.map(s => `
        <div class="kort" style="margin-bottom: 1rem;">
          <div class="kort-header">
            <div class="rad" style="gap: 0.75rem; align-items: center;">
              <div class="avatar">${s.laerling_navn.split(' ').map(n => n[0]).join('').toUpperCase()}</div>
              <div>
                <div class="kort-tittel">${s.laerling_navn}</div>
                <div class="kort-undertittel">${s.utdanningsprogram} · ${s.skole}</div>
              </div>
            </div>
            <span class="${statusBadgeKlasse(s.status)}">${statusTekst(s.status)}</span>
          </div>
          <p style="font-size: 0.875rem; background: #f8fafc; padding: 0.75rem 1rem; border-radius: var(--radius); margin-bottom: 1rem; border-left: 3px solid var(--farge-kant);">
            "${s.melding}"
          </p>
          <div class="kort-footer">
            <span style="font-size: 0.8rem; color: var(--farge-tekst-sekundaer);">Sendt ${formaterDato(s.sendt_dato)}</span>
            <div class="rad" style="gap: 0.5rem;">
              <button
                class="btn btn-suksess btn-liten"
                onclick="oppdaterStatus(${s.id}, 'akseptert')"
                ${s.status === 'akseptert' ? 'disabled' : ''}
              >✓ Aksepter</button>
              <button
                class="btn btn-feil btn-liten"
                onclick="oppdaterStatus(${s.id}, 'avvist')"
                ${s.status === 'avvist' ? 'disabled' : ''}
              >✕ Avvis</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    window.oppdaterStatus = function(id, nyStatus) {
      // I MVP — simulerer oppdatering
      const soknad = alleSoknader.find(s => s.id === id);
      if (soknad) {
        soknad.status = nyStatus;
        visBekreftelse(`Status oppdatert til «${statusTekst(nyStatus)}»`);
        lastSoknader(document.getElementById('status-filter').value);
      }
    };

    document.getElementById('status-filter').addEventListener('change', (e) => {
      lastSoknader(e.target.value);
    });

    // NY ANNONSE MODAL
    document.getElementById('ny-annonse-btn').addEventListener('click', () => {
      document.getElementById('annonse-modal').classList.remove('skjult');
    });

    document.getElementById('annonse-modal-lukk').addEventListener('click', lukkAnnonseModal);
    document.getElementById('annonse-modal-avbryt').addEventListener('click', lukkAnnonseModal);

    function lukkAnnonseModal() {
      document.getElementById('annonse-modal').classList.add('skjult');
      document.getElementById('annonse-form').reset();
    }

    document.getElementById('annonse-form').addEventListener('submit', (e) => {
      e.preventDefault();
      lukkAnnonseModal();
      visBekreftelse('✅ Læreplassannonsen er publisert!');
      lastAnnonser();
    });

    // LOGG UT
    document.getElementById('logg-ut-btn').addEventListener('click', () => {
      if (confirm('Er du sikker på at du vil logge ut?')) loggUt();
    });

    // INIT
    const [annonser] = await Promise.all([lastAnnonser(), lastSoknader()]);
    const soknader = await hentSoknaderBedrift();
    lastStats(await hentMineAnnonser(), soknader);
  </script>
</body>
</html>
