<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mine læreplasser — OLKV</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>

  <nav class="nav">
    <div class="nav-innhold">
      <a href="/" class="nav-logo">
        <span class="logo-ol">OL</span><span class="logo-kv">KV</span>
      </a>
      <div class="nav-lenker" style="gap:0.5rem;align-items:center;">
        <span id="nav-navn" style="font-size:0.9rem;color:var(--farge-tekst-sekundaer);"></span>
        <div class="varsel-dropdown-wrapper">
          <button class="varsel-bjelle" id="varsel-bjelle" aria-label="Varsler">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span class="varsel-bjelle-badge" id="varsel-count" style="display:none;"></span>
          </button>
          <div class="varsel-dropdown skjult" id="varsel-dropdown">
            <div class="varsel-dropdown-header">Varsler</div>
          </div>
        </div>
        <button class="btn btn-ghost btn-liten" id="logg-ut-btn">Logg ut</button>
      </div>
      <button class="hamburger-btn" id="hamburger-btn" aria-label="Meny">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <div class="mobil-meny-overlay skjult" id="meny-overlay"></div>
  <div class="mobil-meny skjult" id="slide-meny">
    <div class="mobil-meny-topp">
      <span class="nav-logo"><span class="logo-ol">OL</span><span class="logo-kv">KV</span></span>
      <button class="mobil-meny-lukk" id="meny-lukk"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <a href="/bedrift/dashboard.html" class="mobil-meny-lenke"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> Dashbord</a>
    <a href="/bedrift/laereplasser.html" class="mobil-meny-lenke"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg> Mine læreplasser</a>
    <a href="/bedrift/soknader.html" class="mobil-meny-lenke"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg> Innkomne søknader</a>
    <button class="mobil-meny-lenke logg-ut" id="meny-logg-ut"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Logg ut</button>
  </div>

  <div class="dashboard-layout">
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <div class="sidebar-seksjon-tittel">Meny</div>
        <a href="/bedrift/dashboard.html" class="sidebar-lenke">
          <span class="sidebar-ikon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span> Dashbord
        </a>
        <a href="/bedrift/laereplasser.html" class="sidebar-lenke aktiv">
          <span class="sidebar-ikon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg></span> Mine læreplasser
        </a>
        <a href="/bedrift/soknader.html" class="sidebar-lenke">
          <span class="sidebar-ikon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span> Innkomne søknader
        </a>
      </nav>
    </aside>

    <main class="hoveddel page-content">
      <div class="rad reveal" style="margin-bottom:2rem;justify-content:space-between;flex-wrap:wrap;gap:1rem;">
        <div>
          <h1 style="font-size:1.75rem;">Mine læreplasser</h1>
          <p style="color:var(--farge-tekst-sekundaer);" id="antall-tekst">Laster…</p>
        </div>
        <button class="btn btn-primary" id="ny-annonse-btn">+ Legg ut ny læreplass</button>
      </div>

      <div id="varsel" class="varsel skjult"></div>

      <section class="reveal" id="annonser-seksjon">
        <div class="rutenett-2" id="annonser-liste">
          <div class="skeleton" style="height:200px;border-radius:var(--radius);"></div>
          <div class="skeleton" style="height:200px;border-radius:var(--radius);"></div>
        </div>
      </section>
    </main>
  </div>

  <!-- NY ANNONSE MODAL -->
  <div class="modal-bakgrunn skjult" id="annonse-modal">
      <div class="modal" style="max-width:600px;">
      <div class="modal-hode">
        <h3 class="modal-tittel" id="annonse-modal-tittel">Legg ut ny læreplass</h3>
        <button class="modal-lukk" id="annonse-lukk-btn">&times;</button>
      </div>
      <div class="modal-kropp">
        <div id="annonse-varsel" class="varsel skjult"></div>
        <form id="annonse-form">
          <div class="form-gruppe">
            <label class="etikett" for="a-tittel">Tittel <span style="color:var(--olkv-red);">*</span></label>
            <input type="text" id="a-tittel" class="input" placeholder="f.eks. Lærling i salgsfaget" required />
          </div>
          <div class="rutenett-2" style="gap:0.75rem;">
            <div class="form-gruppe">
              <label class="etikett" for="a-fagomraade">Fagområde</label>
              <select id="a-fagomraade" class="input"></select>
            </div>
            <div class="form-gruppe">
              <label class="etikett" for="a-sted">Sted</label>
              <input type="text" id="a-sted" class="input" placeholder="f.eks. Bergen" />
            </div>
          </div>
          <div class="form-gruppe">
            <label class="etikett" for="a-beskrivelse">Beskrivelse</label>
            <textarea id="a-beskrivelse" class="input" rows="4" placeholder="Fortell om læreplassen og bedriften…"></textarea>
          </div>
          <div class="form-gruppe">
            <label class="etikett" for="a-krav">Krav til søker</label>
            <textarea id="a-krav" class="input" rows="3" placeholder="f.eks. VG2 Salg, gode samarbeidsevner…"></textarea>
          </div>
          <div class="rutenett-2" style="gap:0.75rem;">
            <div class="form-gruppe">
              <label class="etikett" for="a-antall">Antall plasser</label>
              <input type="number" id="a-antall" class="input" min="1" value="1" />
            </div>
            <div class="form-gruppe">
              <label class="etikett" for="a-start">Startdato</label>
              <input type="date" id="a-start" class="input" />
            </div>
          </div>
          <div class="rutenett-2" style="gap:0.75rem;">
            <div class="form-gruppe">
              <label class="etikett" for="a-frist">Søknadsfrist <span style="color:var(--olkv-red);">*</span></label>
              <input type="date" id="a-frist" class="input" required />
            </div>
            <div class="form-gruppe">
              <label class="etikett" for="a-kontaktperson">Kontaktperson</label>
              <input type="text" id="a-kontaktperson" class="input" placeholder="Navn på kontaktperson" />
            </div>
          </div>
          <div class="form-gruppe">
            <label class="etikett" for="a-kontaktepost">Kontakt e-post</label>
            <input type="email" id="a-kontaktepost" class="input" placeholder="kontakt@bedrift.no" />
          </div>
          <button type="submit" class="btn btn-primary" id="annonse-send-btn" style="width:100%;margin-top:0.5rem;">Publiser læreplass</button>
        </form>
      </div>
    </div>
  </div>

  <script type="module">
    import {
      krevInnlogging, loggUt, hentMineAnnonser, lagreAnnonseUtvidet, oppdaterAnnonse, slettAnnonse,
      formaterDato, initScrollReveal, fagomraader, initVarselBjelle, escHtml, tilJsStr
    } from '../app.js';

    let bruker = null;
    let annonser = [];
    let redigererAnnonseId = null;
    bruker = await krevInnlogging('bedrift');
    if (!bruker) { window.location.href = '/login.html'; }

    document.getElementById('nav-navn').textContent = bruker.navn || '';
    document.getElementById('logg-ut-btn').addEventListener('click', async () => { await loggUt(); });

    // Fyll fagomraade-select
    const fagSelect = document.getElementById('a-fagomraade');
    fagomraader.forEach(f => {
      const opt = document.createElement('option');
      opt.value = f; opt.textContent = f;
      fagSelect.appendChild(opt);
    });

    // Sett min-dato for frist
    const fristInput = document.getElementById('a-frist');
    const standardFristMin = new Date().toISOString().split('T')[0];
    fristInput.min = standardFristMin;

    function oppdaterAnnonseModalTekst() {
      document.getElementById('annonse-modal-tittel').textContent = redigererAnnonseId ? 'Rediger læreplass' : 'Legg ut ny læreplass';
      document.getElementById('annonse-send-btn').textContent = redigererAnnonseId ? 'Lagre endringer' : 'Publiser læreplass';
    }

    function fyllAnnonseSkjema(annonse = {}) {
      document.getElementById('a-tittel').value = annonse.tittel || '';
      document.getElementById('a-fagomraade').value = annonse.fagomraade || '';
      document.getElementById('a-sted').value = annonse.sted || '';
      document.getElementById('a-beskrivelse').value = annonse.beskrivelse || '';
      document.getElementById('a-krav').value = annonse.krav || '';
      document.getElementById('a-antall').value = annonse.antall_plasser || 1;
      document.getElementById('a-start').value = annonse.start_dato || '';
      document.getElementById('a-frist').value = annonse.frist || '';
      document.getElementById('a-kontaktperson').value = annonse.kontaktperson || '';
      document.getElementById('a-kontaktepost').value = annonse.kontakt_epost || '';

      if (annonse.frist && annonse.frist < standardFristMin) {
        fristInput.min = annonse.frist;
        return;
      }
      fristInput.min = standardFristMin;
    }

    function apneAnnonseModal(annonse = null) {
      redigererAnnonseId = annonse ? String(annonse.id) : null;
      document.getElementById('annonse-form').reset();
      document.getElementById('annonse-varsel').classList.add('skjult');
      fyllAnnonseSkjema(annonse || {});
      oppdaterAnnonseModalTekst();
      document.getElementById('annonse-modal').classList.remove('skjult');
    }

    function lukkAnnonseModal() {
      redigererAnnonseId = null;
      document.getElementById('annonse-form').reset();
      document.getElementById('annonse-varsel').classList.add('skjult');
      fristInput.min = standardFristMin;
      oppdaterAnnonseModalTekst();
      document.getElementById('annonse-modal').classList.add('skjult');
    }

    async function lastAnnonser() {
      annonser = await hentMineAnnonser();
      document.getElementById('antall-tekst').textContent = `${annonser.length} læreplasser registrert`;

      const container = document.getElementById('annonser-liste');
      if (!annonser.length) {
        container.innerHTML = `
          <div class="tom-tilstand" style="grid-column:1/-1;">
            <div class="tom-tilstand-ikon"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div>
            <h3>Ingen læreplasser ennå</h3>
            <p>Klikk på "Legg ut ny læreplass" for å publisere din første annonse.</p>
          </div>`;
        return;
      }

      container.innerHTML = annonser.map(a => `
        <div class="kort">
          <div class="kort-header">
            <div>
              <div class="kort-tittel">${escHtml(a.tittel)}</div>
              <div class="kort-undertittel">${escHtml(a.fagomraade || a.bransje || '')}</div>
            </div>
            <span class="badge ${a.aktiv ? 'badge-godkjent' : 'badge-graa'}">${a.aktiv ? 'Aktiv' : 'Inaktiv'}</span>
          </div>
          <div style="margin:0.75rem 0;font-size:0.85rem;color:var(--farge-tekst-sekundaer);">
            ${a.sted ? `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0z"/><circle cx="12" cy="10" r="3"/></svg> ${escHtml(a.sted)} &nbsp;·&nbsp; ` : ''}Frist: ${formaterDato(a.frist)}
          </div>
          <div class="kort-footer">
            <span class="badge badge-blaa">${a.antall_soknader || 0} søknader</span>
            <div class="tabell-handlinger">
              <button class="btn-mini btn-mini-blaa" onclick="redigerKlikk(${tilJsStr(String(a.id))})">Rediger</button>
              <button class="btn-mini btn-mini-roed" onclick="slettKlikk(${tilJsStr(String(a.id))})">Slett</button>
            </div>
          </div>
        </div>`).join('');
    }

    window.redigerKlikk = function(id) {
      const annonse = annonser.find((a) => String(a.id) === String(id));
      if (!annonse) return;
      apneAnnonseModal(annonse);
    };

    window.slettKlikk = async function(id) {
      if (!confirm('Er du sikker på at du vil slette denne læreplassen?')) return;
      try {
        await slettAnnonse(id);
        await lastAnnonser();
      } catch (err) {
        alert(err.message);
      }
    };

    document.getElementById('ny-annonse-btn').addEventListener('click', () => {
      apneAnnonseModal();
    });

    document.getElementById('annonse-lukk-btn').addEventListener('click', () => {
      lukkAnnonseModal();
    });
    document.getElementById('annonse-modal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) lukkAnnonseModal();
    });

    document.getElementById('annonse-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('annonse-send-btn');
      btn.disabled = true;
      btn.textContent = redigererAnnonseId ? 'Lagrer…' : 'Publiserer…';

      try {
        const annonseData = {
          tittel: document.getElementById('a-tittel').value.trim(),
          fagomraade: document.getElementById('a-fagomraade').value,
          sted: document.getElementById('a-sted').value.trim(),
          beskrivelse: document.getElementById('a-beskrivelse').value.trim(),
          krav: document.getElementById('a-krav').value.trim(),
          antall_plasser: parseInt(document.getElementById('a-antall').value) || 1,
          start_dato: document.getElementById('a-start').value || '',
          frist: document.getElementById('a-frist').value,
          kontaktperson: document.getElementById('a-kontaktperson').value.trim(),
          kontakt_epost: document.getElementById('a-kontaktepost').value.trim()
        };

        if (redigererAnnonseId) {
          await oppdaterAnnonse(redigererAnnonseId, annonseData);
        } else {
          await lagreAnnonseUtvidet(annonseData);
        }

        const varRedigering = !!redigererAnnonseId;
        lukkAnnonseModal();
        await lastAnnonser();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = varRedigering ? 'Læreplassen er oppdatert!' : 'Læreplassen er publisert!';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
      } catch (err) {
        document.getElementById('annonse-varsel').className = 'varsel varsel-feil';
        document.getElementById('annonse-varsel').textContent = err.message;
        document.getElementById('annonse-varsel').classList.remove('skjult');
      } finally {
        btn.disabled = false;
        oppdaterAnnonseModalTekst();
      }
    });

    await lastAnnonser();
    initScrollReveal();
    initVarselBjelle();
  </script>
  <script src="/cookie-banner.js" defer></script>
  <nav class="bunn-nav" id="bunn-nav">
    <a href="/bedrift/dashboard.html" class="bunn-nav-lenke" data-side="dashboard">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Dashbord</span>
    </a>
    <a href="/bedrift/laereplasser.html" class="bunn-nav-lenke" data-side="laereplasser">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
      <span>Læreplasser</span>
    </a>
    <a href="/bedrift/soknader.html" class="bunn-nav-lenke" data-side="soknader">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span>Søknader</span>
    </a>
  </nav>
  <script type="module">
    const sti = window.location.pathname;
    document.querySelectorAll('.bunn-nav-lenke').forEach(a => {
      const side = a.dataset.side;
      if (
        (side === 'dashboard' && sti.includes('dashboard')) ||
        (side === 'laereplasser' && sti.includes('laereplasser')) ||
        (side === 'soknader' && sti.includes('soknader'))
      ) a.classList.add('aktiv');
    });
    const btn = document.getElementById('hamburger-btn');
    const overlay = document.getElementById('meny-overlay');
    const meny = document.getElementById('slide-meny');
    const lukk = document.getElementById('meny-lukk');
    const apne = () => { meny.classList.remove('skjult'); overlay.classList.remove('skjult'); document.body.style.overflow = 'hidden'; };
    const lukke = () => { meny.classList.add('skjult'); overlay.classList.add('skjult'); document.body.style.overflow = ''; };
    btn?.addEventListener('click', apne);
    lukk?.addEventListener('click', lukke);
    overlay?.addEventListener('click', lukke);
    document.getElementById('meny-logg-ut')?.addEventListener('click', async () => {
      const { loggUt } = await import('../app.js');
      await loggUt();
    });
  </script>
</body>
</html>
