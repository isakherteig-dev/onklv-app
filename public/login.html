<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logg inn — OLKV</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-side">

  <!-- Flytende former (bakgrunn) -->
  <div class="login-shape login-shape-1"></div>
  <div class="login-shape login-shape-2"></div>
  <div class="login-shape login-shape-3"></div>

  <!-- NAVIGASJON -->
  <nav class="login-nav">
    <a href="/" class="nav-logo">
      <span class="logo-ol">OL</span><span class="logo-kv">KV</span>
    </a>
    <a href="/register.html" style="font-size: 0.875rem;">Registrer deg →</a>
  </nav>

  <!-- INNHOLD -->
  <main style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem 1rem 2rem; position: relative; z-index: 10;">

    <!-- Logo stor -->
    <div class="login-logo-stor" style="margin-bottom: 0.25rem;">
      <span class="logo-ol">OL</span><span class="logo-kv">KV</span>
    </div>
    <p class="login-tagline">Opplæringskontoret i Vestland · Fremtiden er din</p>

    <!-- SKJEMA-KORT -->
    <div class="login-kort">

      <!-- DEMO-KONTOER -->
      <p style="font-size: 0.75rem; font-weight: 700; color: var(--olkv-gray); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.6rem;">
        Demo-kontoer — klikk for å fylle ut:
      </p>
      <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-bottom: 1.25rem;">
        <button onclick="fyllDemoKonto('laerling@demo.no', 'demo1234')"
          class="demo-konto-knapp">
          <div class="demo-konto-ikon" style="background: var(--olkv-blue);">L</div>
          <div style="font-size: 0.75rem; font-weight: 700; color: var(--olkv-dark);">Lærling</div>
          <div style="font-size: 0.68rem; color: var(--olkv-gray);">laerling@demo.no</div>
        </button>
        <button onclick="fyllDemoKonto('bedrift@demo.no', 'demo1234')"
          class="demo-konto-knapp">
          <div class="demo-konto-ikon" style="background: var(--olkv-red);">B</div>
          <div style="font-size: 0.75rem; font-weight: 700; color: var(--olkv-dark);">Bedrift</div>
          <div style="font-size: 0.68rem; color: var(--olkv-gray);">bedrift@demo.no</div>
        </button>
        <button onclick="fyllDemoKonto('admin@demo.no', 'demo1234')"
          class="demo-konto-knapp">
          <div class="demo-konto-ikon" style="background: var(--olkv-gray);">A</div>
          <div style="font-size: 0.75rem; font-weight: 700; color: var(--olkv-dark);">Admin</div>
          <div style="font-size: 0.68rem; color: var(--olkv-gray);">admin@demo.no</div>
        </button>
      </div>
      <p style="font-size: 0.72rem; color: var(--olkv-gray); text-align: center; margin-bottom: 1.25rem;">
        Passord for alle: <strong>demo1234</strong>
      </p>

      <hr class="skille" />

      <div id="varsel" class="varsel skjult" style="margin-top: 1rem;"></div>

      <form id="login-form" novalidate style="margin-top: 1.25rem;">
        <div class="form-gruppe">
          <label for="epost">E-postadresse</label>
          <input type="email" id="epost" name="epost" placeholder="din@epost.no" autocomplete="email" required />
        </div>
        <div class="form-gruppe">
          <label for="passord">Passord</label>
          <input type="password" id="passord" name="passord" placeholder="Skriv inn passordet ditt" autocomplete="current-password" required />
        </div>
        <div style="text-align: right; margin-top: -0.75rem; margin-bottom: 1rem;">
          <a href="/forgot-password.html" style="font-size: 0.82rem; color: var(--olkv-gray);">Glemt passord?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-puls" style="width: 100%;" id="logg-inn-btn">
          Logg inn →
        </button>
      </form>

      <div style="display: flex; align-items: center; gap: 0.75rem; margin: 1.25rem 0;">
        <div style="flex: 1; height: 1px; background: var(--olkv-border);"></div>
        <span style="font-size: 0.78rem; color: var(--olkv-gray);">eller</span>
        <div style="flex: 1; height: 1px; background: var(--olkv-border);"></div>
      </div>

      <button id="google-btn" style="width: 100%; padding: 0.75rem; border: 1.5px solid var(--olkv-border); border-radius: var(--radius); background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.6rem; font-size: 0.9rem; font-weight: 600; font-family: inherit; color: var(--olkv-dark); transition: var(--overgang);"
        onmouseover="this.style.borderColor='var(--olkv-blue-light)'; this.style.background='var(--olkv-blue-pale)'"
        onmouseout="this.style.borderColor='var(--olkv-border)'; this.style.background='#fff'">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Fortsett med Google
      </button>

      <p style="font-size: 0.82rem; text-align: center; color: var(--olkv-gray); margin-top: 1.5rem;">
        Ikke registrert?
        <a href="/register.html?rolle=laerling">Registrer som lærling</a>
        &nbsp;·&nbsp;
        <a href="/register.html?rolle=bedrift">Registrer bedrift</a>
      </p>
    </div>
  </main>

  <!-- FOOTER -->
  <footer style="position: relative; z-index: 10; text-align: center; padding: 1.25rem; color: rgba(255,255,255,0.35); font-size: 0.78rem;">
    © 2026 OLKV · Opplæringskontoret i Vestland &nbsp;·&nbsp;
    <a href="/personvern.html" style="color: rgba(255,255,255,0.45);">Personvern</a>
  </footer>

  <style>
    .demo-konto-knapp {
      padding: 0.75rem 0.4rem;
      border: 1.5px solid var(--olkv-border);
      border-radius: var(--radius);
      background: #fff;
      cursor: pointer;
      text-align: center;
      transition: var(--overgang);
      font-family: inherit;
    }
    .demo-konto-knapp:hover {
      border-color: var(--olkv-blue-light);
      background: var(--olkv-blue-pale);
    }
    .demo-konto-ikon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      margin: 0 auto 0.4rem;
      font-family: 'Playfair Display', serif;
    }
  </style>

  <script type="module">
    import { loggInn, loggInnMedGoogle, visFeilmelding, oversettFirebaseFeil } from './app.js';
    import { auth } from './firebase-config.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js';

    // Redirect hvis allerede innlogget
    onAuthStateChanged(auth, async (user) => {
      if (!user) return;
      try {
        const token = await user.getIdToken();
        const res = await fetch('/api/auth/meg', {
          headers: { Authorization: `Bearer ${token}` }
        });
        if (!res.ok) return;
        const bruker = await res.json();
        const sider = { laerling: '/laerling/dashboard.html', bedrift: '/bedrift/dashboard.html', admin: '/admin/dashboard.html' };
        window.location.href = sider[bruker.rolle] || '/';
      } catch { /* la brukeren logge inn på nytt */ }
    });

    window.fyllDemoKonto = function(epost, passord) {
      document.getElementById('epost').value = epost;
      document.getElementById('passord').value = passord;
      document.getElementById('epost').focus();
    };

    const form = document.getElementById('login-form');
    const btn  = document.getElementById('logg-inn-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const epost  = document.getElementById('epost').value.trim();
      const passord = document.getElementById('passord').value;

      if (!epost || !passord) {
        visFeilmelding('Fyll ut e-post og passord');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Logger inn…';

      try {
        const bruker = await loggInn(epost, passord);
        const sider = { laerling: '/laerling/dashboard.html', bedrift: '/bedrift/dashboard.html', admin: '/admin/dashboard.html' };
        window.location.href = sider[bruker.rolle] || '/';
      } catch (err) {
        const melding = err.message?.includes('venter godkjenning')
          ? 'Bedriftskontoen din venter godkjenning fra Opplæringskontoret. Du får beskjed på e-post når den er klar.'
          : (oversettFirebaseFeil(err.code) || err.message || 'Feil e-post eller passord');
        visFeilmelding(melding);
        btn.disabled = false;
        btn.textContent = 'Logg inn →';
      }
    });

    document.getElementById('google-btn').addEventListener('click', async () => {
      try {
        const bruker = await loggInnMedGoogle();
        if (!bruker) return; // Sendt til registrering
        const sider = { laerling: '/laerling/dashboard.html', bedrift: '/bedrift/dashboard.html', admin: '/admin/dashboard.html' };
        window.location.href = sider[bruker.rolle] || '/';
      } catch (err) {
        const melding = err.message?.includes('venter godkjenning')
          ? 'Bedriftskontoen din venter godkjenning fra Opplæringskontoret. Du får beskjed på e-post når den er klar.'
          : (oversettFirebaseFeil(err.code) || err.message || 'Google-innlogging feilet');
        visFeilmelding(melding);
      }
    });
  </script>
</body>
</html>
