<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logg inn — OLKV</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-side">

  <!-- Flytende former (bakgrunn) -->
  <div class="login-shape login-shape-1"></div>
  <div class="login-shape login-shape-2"></div>
  <div class="login-shape login-shape-3"></div>

  <!-- NAVIGASJON -->
  <nav class="login-nav">
    <a href="/" class="nav-logo">
      <span class="logo-ol">OL</span><span class="logo-kv">KV</span>
    </a>
    <a href="/laerling/registrer.html" style="font-size: 0.875rem;">Registrer deg →</a>
  </nav>

  <!-- INNHOLD -->
  <main style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem 1rem 2rem; position: relative; z-index: 10;">

    <!-- Logo stor -->
    <div class="login-logo-stor" style="margin-bottom: 0.25rem;">
      <span class="logo-ol">OL</span><span class="logo-kv">KV</span>
    </div>
    <p class="login-tagline">Opplæringskontoret i Vestland · Fremtiden er din</p>

    <!-- SKJEMA-KORT -->
    <div class="login-kort">

      <!-- DEMO-KONTOER -->
      <p style="font-size: 0.75rem; font-weight: 700; color: var(--olkv-gray); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.6rem;">
        Demo-kontoer — klikk for å fylle ut:
      </p>
      <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-bottom: 1.25rem;">
        <button
          onclick="fyllDemoKonto('laerling@demo.no', 'demo1234')"
          style="padding: 0.75rem 0.4rem; border: 1.5px solid var(--olkv-border); border-radius: var(--radius); background: #fff; cursor: pointer; text-align: center; transition: var(--overgang); font-family: inherit;"
          onmouseover="this.style.borderColor='var(--olkv-blue-light)'; this.style.background='var(--olkv-blue-pale)'"
          onmouseout="this.style.borderColor='var(--olkv-border)'; this.style.background='#fff'"
        >
          <div style="font-size: 1.4rem; margin-bottom: 0.3rem;">🎓</div>
          <div style="font-size: 0.75rem; font-weight: 700; color: var(--olkv-dark);">Lærling</div>
          <div style="font-size: 0.68rem; color: var(--olkv-gray);">laerling@demo.no</div>
        </button>
        <button
          onclick="fyllDemoKonto('bedrift@demo.no', 'demo1234')"
          style="padding: 0.75rem 0.4rem; border: 1.5px solid var(--olkv-border); border-radius: var(--radius); background: #fff; cursor: pointer; text-align: center; transition: var(--overgang); font-family: inherit;"
          onmouseover="this.style.borderColor='var(--olkv-blue-light)'; this.style.background='var(--olkv-blue-pale)'"
          onmouseout="this.style.borderColor='var(--olkv-border)'; this.style.background='#fff'"
        >
          <div style="font-size: 1.4rem; margin-bottom: 0.3rem;">🏢</div>
          <div style="font-size: 0.75rem; font-weight: 700; color: var(--olkv-dark);">Bedrift</div>
          <div style="font-size: 0.68rem; color: var(--olkv-gray);">bedrift@demo.no</div>
        </button>
        <button
          onclick="fyllDemoKonto('admin@demo.no', 'demo1234')"
          style="padding: 0.75rem 0.4rem; border: 1.5px solid var(--olkv-border); border-radius: var(--radius); background: #fff; cursor: pointer; text-align: center; transition: var(--overgang); font-family: inherit;"
          onmouseover="this.style.borderColor='var(--olkv-blue-light)'; this.style.background='var(--olkv-blue-pale)'"
          onmouseout="this.style.borderColor='var(--olkv-border)'; this.style.background='#fff'"
        >
          <div style="font-size: 1.4rem; margin-bottom: 0.3rem;">⚙️</div>
          <div style="font-size: 0.75rem; font-weight: 700; color: var(--olkv-dark);">Admin</div>
          <div style="font-size: 0.68rem; color: var(--olkv-gray);">admin@demo.no</div>
        </button>
      </div>
      <p style="font-size: 0.72rem; color: var(--olkv-gray); text-align: center; margin-bottom: 1.25rem;">
        Passord for alle: <strong>demo1234</strong>
      </p>

      <hr class="skille" />

      <div id="varsel" class="varsel skjult" style="margin-top: 1rem;"></div>

      <form id="login-form" novalidate style="margin-top: 1.25rem;">
        <div class="form-gruppe">
          <label for="epost">E-postadresse</label>
          <input type="email" id="epost" name="epost" placeholder="din@epost.no" autocomplete="email" required />
        </div>
        <div class="form-gruppe">
          <label for="passord">Passord</label>
          <input type="password" id="passord" name="passord" placeholder="Skriv inn passordet ditt" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn btn-primary btn-puls" style="width: 100%; margin-top: 0.25rem;" id="logg-inn-btn">
          Logg inn →
        </button>
      </form>

      <p style="font-size: 0.82rem; text-align: center; color: var(--olkv-gray); margin-top: 1.5rem;">
        Ikke registrert?
        <a href="/laerling/registrer.html">Registrer som lærling</a>
        &nbsp;·&nbsp;
        <a href="/bedrift/registrer.html">Registrer bedrift</a>
      </p>
    </div>
  </main>

  <!-- FOOTER -->
  <footer style="position: relative; z-index: 10; text-align: center; padding: 1.25rem; color: rgba(255,255,255,0.35); font-size: 0.78rem;">
    © 2026 OLKV · Opplæringskontoret i Vestland &nbsp;·&nbsp;
    <a href="#" style="color: rgba(255,255,255,0.45);">Personvern</a>
  </footer>

  <script type="module">
    import { loggInn, visFeilmelding, erInnlogget, hentBruker } from './app.js';

    if (erInnlogget()) {
      const bruker = hentBruker();
      const sider = { laerling: '/laerling/dashboard.html', bedrift: '/bedrift/dashboard.html', admin: '/admin/dashboard.html' };
      window.location.href = sider[bruker.rolle] || '/';
    }

    window.fyllDemoKonto = function(epost, passord) {
      document.getElementById('epost').value = epost;
      document.getElementById('passord').value = passord;
      document.getElementById('epost').focus();
    };

    const form = document.getElementById('login-form');
    const btn = document.getElementById('logg-inn-btn');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const epost = document.getElementById('epost').value.trim();
      const passord = document.getElementById('passord').value;

      if (!epost || !passord) {
        visFeilmelding('Fyll ut e-post og passord');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Logger inn…';

      try {
        const bruker = loggInn(epost, passord);
        const sider = { laerling: '/laerling/dashboard.html', bedrift: '/bedrift/dashboard.html', admin: '/admin/dashboard.html' };
        window.location.href = sider[bruker.rolle] || '/';
      } catch (err) {
        visFeilmelding(err.message || 'Feil e-post eller passord');
        btn.disabled = false;
        btn.textContent = 'Logg inn →';
      }
    });
  </script>
</body>
</html>
