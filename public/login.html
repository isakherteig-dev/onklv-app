<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logg inn — OLKV</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-side">

  <!-- Flytende former (bakgrunn) -->
  <div class="login-shape login-shape-1"></div>
  <div class="login-shape login-shape-2"></div>
  <div class="login-shape login-shape-3"></div>

  <!-- NAVIGASJON -->
  <nav class="login-nav">
    <a href="/" class="nav-logo">
      <span class="logo-ol">OL</span><span class="logo-kv">KV</span>
    </a>
    <a href="/register.html" id="nav-register-lenke" style="font-size: 0.875rem;">Registrer deg →</a>
  </nav>

  <!-- INNHOLD -->
  <main style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem 1rem 2rem; position: relative; z-index: 10;">

    <!-- STEG 1: ROLLEVALG -->
    <div id="steg-1" class="login-steg">
      <div class="login-logo-stor" style="margin-bottom: 0.25rem;">
        <span class="logo-ol">OL</span><span class="logo-kv">KV</span>
      </div>
      <p class="login-tagline">Opplæringskontoret i Vestland · Fremtiden er din</p>

      <p style="color: rgba(255,255,255,0.75); font-size: 0.95rem; margin: 1.5rem 0 1.25rem; text-align: center;">
        Hvem er du?
      </p>

      <div class="rolle-valg-grid">
        <button class="rolle-kort laerling" onclick="byttTilSteg2('laerling')">
          <span class="rolle-ikon"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg></span>
          <span class="rolle-tittel">Jeg er lærling</span>
          <span class="rolle-beskr">Finn din lærlingplass</span>
        </button>
        <button class="rolle-kort bedrift" onclick="byttTilSteg2('bedrift')">
          <span class="rolle-ikon"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg></span>
          <span class="rolle-tittel">Jeg er bedrift</span>
          <span class="rolle-beskr">Finn dine lærlinger</span>
        </button>
      </div>

      <p style="margin-top: 1.5rem; font-size: 0.82rem; color: rgba(255,255,255,0.4); text-align: center;">
        Har du ikke konto? <a href="/register.html" id="start-register-lenke" style="color: rgba(255,255,255,0.65);">Registrer deg her</a>
      </p>
    </div>

    <!-- STEG 2: INNLOGGINGSSKJEMA -->
    <div id="steg-2" class="login-steg" style="display: none;">

      <!-- Tilbake-pil -->
      <button id="tilbake-btn" onclick="byttTilSteg1()" style="background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:0.4rem;color:rgba(255,255,255,0.55);font-size:0.875rem;padding:0;font-family:inherit;margin-bottom:1.25rem;transition:color 0.2s;">
        ← Tilbake
      </button>

      <!-- Logo stor -->
      <div class="login-logo-stor" style="margin-bottom: 0.25rem;">
        <span class="logo-ol">OL</span><span class="logo-kv">KV</span>
      </div>
      <p class="login-tagline" id="login-tagline">Logg inn som lærling</p>

      <!-- SKJEMA-KORT -->
      <div class="login-kort">

        <div id="varsel" class="varsel skjult" style="margin-top: 1rem;"></div>

        <form id="login-form" novalidate style="margin-top: 1.25rem;">
          <div class="form-gruppe">
            <label for="epost">E-postadresse</label>
            <input type="email" id="epost" name="epost" placeholder="din@epost.no" autocomplete="email" required />
          </div>
          <div class="form-gruppe">
            <label for="passord">Passord</label>
            <input type="password" id="passord" name="passord" placeholder="Skriv inn passordet ditt" autocomplete="current-password" required />
          </div>
          <div style="text-align: right; margin-top: -0.75rem; margin-bottom: 1rem;">
            <a href="/forgot-password.html" style="font-size: 0.82rem; color: var(--olkv-gray);">Glemt passord?</a>
          </div>
          <button type="submit" class="btn btn-primary btn-puls" style="width: 100%;" id="logg-inn-btn">
            Logg inn →
          </button>
        </form>

        <div style="display: flex; align-items: center; gap: 0.75rem; margin: 1.25rem 0;">
          <div style="flex: 1; height: 1px; background: var(--olkv-border);"></div>
          <span style="font-size: 0.78rem; color: var(--olkv-gray);">eller</span>
          <div style="flex: 1; height: 1px; background: var(--olkv-border);"></div>
        </div>

        <button id="google-btn" style="width: 100%; padding: 0.75rem; border: 1.5px solid var(--olkv-border); border-radius: var(--radius); background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.6rem; font-size: 0.9rem; font-weight: 600; font-family: inherit; color: var(--olkv-dark); transition: var(--overgang);"
          onmouseover="this.style.borderColor='var(--olkv-blue-light)'; this.style.background='var(--olkv-blue-pale)'"
          onmouseout="this.style.borderColor='var(--olkv-border)'; this.style.background='#fff'">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Fortsett med Google
        </button>

        <p style="font-size: 0.82rem; text-align: center; color: var(--olkv-gray); margin-top: 1.5rem;">
          Ikke registrert?
          <a href="/register.html?rolle=laerling" id="reg-laerling-lenke">Registrer som lærling</a>
          &nbsp;·&nbsp;
          <a href="/register.html?rolle=bedrift" id="reg-bedrift-lenke">Registrer bedrift</a>
        </p>
      </div>
    </div>

  </main>

  <!-- FOOTER -->
  <footer style="position: relative; z-index: 10; text-align: center; padding: 1.25rem; color: rgba(255,255,255,0.35); font-size: 0.78rem;">
    © 2026 OLKV · Opplæringskontoret i Vestland &nbsp;·&nbsp;
    <a href="/personvern.html" style="color: rgba(255,255,255,0.45);">Personvern</a>
  </footer>

  <style>
    .login-steg {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: stegInn 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes stegInn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .rolle-valg-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      width: 100%;
    }
    .rolle-kort {
      border-radius: 14px;
      padding: 2rem 1.25rem;
      cursor: pointer;
      text-align: center;
      transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      border: 2px solid transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      font-family: inherit;
    }
    .rolle-kort:hover {
      transform: translateY(-8px);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.3);
    }
    .rolle-kort:active { transform: translateY(-3px); }
    .rolle-kort.laerling { background: var(--olkv-blue); color: #fff; }
    .rolle-kort.laerling:hover { background: var(--olkv-blue-light); }
    .rolle-kort.bedrift  { background: var(--olkv-red);  color: #fff; }
    .rolle-kort.bedrift:hover  { background: var(--olkv-red-light); }
    .rolle-ikon   { font-size: 2.5rem; line-height: 1; }
    .rolle-tittel { font-size: 1.05rem; font-weight: 700; }
    .rolle-beskr  { font-size: 0.82rem; opacity: 0.8; }
    #tilbake-btn:hover { color: rgba(255,255,255,0.85) !important; }
    @media (max-width: 480px) {
      .rolle-valg-grid { grid-template-columns: 1fr 1fr; gap: 0.75rem; }
      .rolle-kort { padding: 1.5rem 0.75rem; }
    }
  </style>

  <script type="module">
    import { loggInn, loggInnMedGoogle, visFeilmelding, oversettFirebaseFeil } from './app.js';
    import { auth } from './firebase-config.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js';

    const params = new URLSearchParams(window.location.search);

    function sanitiserInternSti(sti) {
      if (!sti || typeof sti !== 'string' || !sti.startsWith('/') || sti.startsWith('//')) {
        return '';
      }

      try {
        const url = new URL(sti, window.location.origin);
        if (url.origin !== window.location.origin) return '';
        return `${url.pathname}${url.search}${url.hash}`;
      } catch {
        return '';
      }
    }

    const returnTo = sanitiserInternSti(params.get('returnTo') || '');

    function byggInternLenke(path, ekstraParams = {}) {
      const url = new URL(path, window.location.origin);
      Object.entries(ekstraParams).forEach(([nokkel, verdi]) => {
        if (verdi) {
          url.searchParams.set(nokkel, verdi);
        }
      });
      if (returnTo) {
        url.searchParams.set('returnTo', returnTo);
      }
      return `${url.pathname}${url.search}${url.hash}`;
    }

    function destinasjonFor(bruker) {
      if (bruker?.rolle === 'laerling' && returnTo) {
        return returnTo;
      }
      const sider = { laerling: '/laerling/dashboard.html', bedrift: '/bedrift/dashboard.html', admin: '/admin/dashboard.html' };
      return sider[bruker?.rolle] || '/';
    }

    function oppdaterRegisterLenker(rolle = 'laerling') {
      const navRegisterLenke = document.getElementById('nav-register-lenke');
      const startRegisterLenke = document.getElementById('start-register-lenke');
      const regLaerlingLenke = document.getElementById('reg-laerling-lenke');
      const regBedriftLenke = document.getElementById('reg-bedrift-lenke');

      navRegisterLenke.href = byggInternLenke('/register.html');
      startRegisterLenke.href = byggInternLenke('/register.html');
      regLaerlingLenke.href = byggInternLenke('/register.html', { rolle: 'laerling' });
      regBedriftLenke.href = byggInternLenke('/register.html', { rolle: 'bedrift' });
    }

    // Redirect hvis allerede innlogget (og e-post er verifisert)
    auth.authStateReady().then(async () => {
      const user = auth.currentUser;
      if (!user) return;
      const erGoogle = user.providerData?.some(p => p.providerId === 'google.com');
      if (!erGoogle && !user.emailVerified) return;
      try {
        const token = await user.getIdToken();
        const res = await fetch('/api/auth/meg', {
          headers: { Authorization: `Bearer ${token}` }
        });
        if (!res.ok) return;
        const bruker = await res.json();
        window.location.href = destinasjonFor(bruker);
      } catch { /* la brukeren logge inn på nytt */ }
    });

    let valgtRolle = 'laerling';
    oppdaterRegisterLenker(valgtRolle);

    window.byttTilSteg2 = function(rolle) {
      valgtRolle = rolle;
      document.getElementById('login-tagline').textContent =
        rolle === 'laerling' ? 'Logg inn som lærling' : 'Logg inn som bedrift';
      oppdaterRegisterLenker(rolle === 'laerling' ? 'laerling' : 'bedrift');

      const steg1 = document.getElementById('steg-1');
      const steg2 = document.getElementById('steg-2');
      steg1.style.display = 'none';
      steg2.style.display = 'flex';
      steg2.style.animation = 'none';
      steg2.offsetHeight; // reflow
      steg2.style.animation = '';
    };

    window.byttTilSteg1 = function() {
      const steg1 = document.getElementById('steg-1');
      const steg2 = document.getElementById('steg-2');
      steg2.style.display = 'none';
      steg1.style.display = 'flex';
      steg1.style.animation = 'none';
      steg1.offsetHeight;
      steg1.style.animation = '';
      document.getElementById('varsel').classList.add('skjult');
    };

    const form = document.getElementById('login-form');
    const btn  = document.getElementById('logg-inn-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const epost  = document.getElementById('epost').value.trim();
      const passord = document.getElementById('passord').value;

      if (!epost || !passord) {
        visFeilmelding('Fyll ut e-post og passord');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Logger inn…';

      try {
        const bruker = await loggInn(epost, passord);
        window.location.href = destinasjonFor(bruker);
      } catch (err) {
        if (err.message?.includes('verifisere e-posten')) {
          const varselEl = document.getElementById('varsel');
          varselEl.className = 'varsel varsel-feil';
          varselEl.innerHTML = `Du må bekrefte e-posten din før du kan logge inn. <a href="/verifiser-epost.html?epost=${encodeURIComponent(epost)}&uid=" style="color:inherit;font-weight:700;text-decoration:underline;">Gå til verifisering →</a>`;
          varselEl.classList.remove('skjult');
          varselEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        } else {
          const melding = err.message?.includes('venter godkjenning')
            ? 'Bedriftskontoen din venter godkjenning fra Opplæringskontoret. Du får beskjed på e-post når den er klar.'
            : (oversettFirebaseFeil(err.code) || err.message || 'Feil e-post eller passord');
          visFeilmelding(melding);
        }
        btn.disabled = false;
        btn.textContent = 'Logg inn →';
      }
    });

    document.getElementById('google-btn').addEventListener('click', async () => {
      try {
        const bruker = await loggInnMedGoogle();
        if (!bruker) return; // Sendt til registrering
        window.location.href = destinasjonFor(bruker);
      } catch (err) {
        const melding = err.message?.includes('venter godkjenning')
          ? 'Bedriftskontoen din venter godkjenning fra Opplæringskontoret. Du får beskjed på e-post når den er klar.'
          : (oversettFirebaseFeil(err.code) || err.message || 'Google-innlogging feilet');
        visFeilmelding(melding);
      }
    });
  </script>
  <script src="/cookie-banner.js" defer></script>
</body>
</html>
